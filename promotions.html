<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Акции — Marketing Bot</title>
    <meta name="theme-color" content="#0b1226">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #071028;
            --card: rgba(255, 255, 255, 0.03);
            --muted: rgba(255, 255, 255, 0.65);
            --gold: linear-gradient(90deg, #d4af37, #f6e7a0);
            --accent: #d4af37;
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow-x: hidden;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
            background: radial-gradient(1200px 600px at 10% 10%, rgba(212, 175, 55, 0.08), transparent),
                        linear-gradient(180deg, #081428 0%, #041226 100%);
            color: var(--text);
        }

        .container {
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            background: var(--gold);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.5;
        }

        .promotions-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .promotion-card {
            background: var(--card);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .promotion-card:hover {
            border-color: rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
        }

        .promotion-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gold);
        }

        .promotion-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .promotion-description {
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .promotion-dates {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 0.9rem;
        }

        .date-item {
            background: rgba(212, 175, 55, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
            color: var(--accent);
        }

        .promotion-status {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-active {
            background: rgba(0, 255, 0, 0.1);
            color: #00ff00;
        }

        .status-published {
            background: rgba(255, 165, 0, 0.1);
            color: #ffa500;
        }

        .status-finished {
            background: rgba(128, 128, 128, 0.1);
            color: #888;
        }

        .no-promotions {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        .no-promotions-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .no-promotions h2 {
            font-size: 1.5rem;
            margin-bottom: 12px;
            color: var(--text);
        }

        .no-promotions p {
            font-size: 1rem;
            line-height: 1.5;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--muted);
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(212, 175, 55, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .back-button {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .back-button:hover {
            transform: translateX(-50%) translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
        }

        .media-container {
            margin: 16px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .media-item {
            border-radius: 8px;
            overflow: hidden;
            max-width: 100%;
        }

        .media-item img {
            max-width: 200px;
            height: auto;
            display: block;
        }

        .media-item video {
            max-width: 200px;
            height: auto;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .promotion-card {
                padding: 20px;
            }
            
            .promotion-dates {
                flex-direction: column;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎉 Акции</h1>
            <p>Актуальные предложения и мероприятия</p>
        </div>

        <div class="promotions-list" id="promotionsList">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Загружаем актуальные акции...</p>
            </div>
        </div>

        <button class="back-button" onclick="goBack()">← Назад в меню</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function formatDate(dateStr) {
            if (!dateStr) return '';
            try {
                const date = new Date(dateStr);
                return date.toLocaleDateString('ru-RU');
            } catch (e) {
                return dateStr;
            }
        }

        function getStatusText(status) {
            switch (status) {
                case 'active':
                    return 'Активна';
                case 'published':
                    return 'Опубликована';
                case 'finished':
                    return 'Завершена';
                default:
                    return status;
            }
        }

        function getStatusEmoji(status) {
            switch (status) {
                case 'active':
                    return '🟢';
                case 'published':
                    return '🟡';
                case 'finished':
                    return '🔴';
                default:
                    return '⚪';
            }
        }

        function renderMedia(mediaList) {
            if (!mediaList || mediaList.length === 0) return '';
            
            let mediaHtml = '<div class="media-container">';
            mediaList.forEach(media => {
                if (media.type === 'image') {
                    mediaHtml += `<div class="media-item"><img src="${media.url}" alt="Изображение акции" /></div>`;
                } else if (media.type === 'video') {
                    mediaHtml += `<div class="media-item"><video controls><source src="${media.url}" type="video/mp4"></video></div>`;
                }
            });
            mediaHtml += '</div>';
            return mediaHtml;
        }

        function renderPromotions(promotions) {
            const container = document.getElementById('promotionsList');
            
            if (!promotions || promotions.length === 0) {
                container.innerHTML = `
                    <div class="no-promotions">
                        <div class="no-promotions-icon">📝</div>
                        <h2>Актуальных акций пока нет</h2>
                        <p>Следите за обновлениями!<br>Мы обязательно сообщим о новых предложениях.</p>
                    </div>
                `;
                return;
            }

            let html = '';
            promotions.forEach(promotion => {
                const datesHtml = [];
                if (promotion.start_date) {
                    datesHtml.push(`<span class="date-item">📅 Начало: ${formatDate(promotion.start_date)}</span>`);
                }
                if (promotion.end_date) {
                    datesHtml.push(`<span class="date-item">⏰ Окончание: ${formatDate(promotion.end_date)}</span>`);
                }

                const statusEmoji = getStatusEmoji(promotion.ui_status);
                const statusText = getStatusText(promotion.ui_status);

                html += `
                    <div class="promotion-card">
                        <div class="promotion-title">
                            ${statusEmoji} ${promotion.name || 'Без названия'}
                        </div>
                        ${promotion.description ? `<div class="promotion-description">${promotion.description}</div>` : ''}
                        ${datesHtml.length > 0 ? `<div class="promotion-dates">${datesHtml.join('')}</div>` : ''}
                        ${renderMedia(promotion.media || [])}
                        <div class="promotion-status status-${promotion.ui_status || 'unknown'}">
                            ${statusText}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function loadPromotions() {
            // Отправляем запрос на получение акций через WebApp API
            try {
                // Отправляем сообщение боту для получения акций
                const data = {
                    type: 'get_promotions',
                    action: 'load_promotions'
                };
                
                if (typeof tg.sendData === 'function') {
                    tg.sendData(JSON.stringify(data));
                    // Показываем заглушку пока не получим данные
                    setTimeout(() => {
                        // Мок-данные для тестирования
                        const mockPromotions = [
                            {
                                name: 'Тестовая акция',
                                description: 'Описание тестовой акции для проверки работы системы',
                                ui_status: 'active',
                                start_date: '2024-01-01',
                                end_date: '2024-12-31',
                                media: []
                            }
                        ];
                        renderPromotions(mockPromotions);
                    }, 1500);
                } else {
                    // Fallback: показываем сообщение об отсутствии акций
                    renderPromotions([]);
                }
            } catch (error) {
                console.error('Error loading promotions:', error);
                // Fallback: показываем сообщение об отсутствии акций
                renderPromotions([]);
            }
        }

        function goBack() {
            if (tg.BackButton) {
                tg.BackButton.show();
                tg.BackButton.onClick(() => {
                    tg.close();
                });
            } else {
                tg.close();
            }
        }

        // Инициализация
        loadPromotions();
    </script>
</body>
</html>
