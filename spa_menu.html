<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Меню — Marketing SPA</title>
    <meta name="theme-color" content="#0b1226">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root{--bg:#071028;--card:rgba(255,255,255,0.03);--muted:rgba(255,255,255,0.65);--gold:linear-gradient(90deg,#d4af37,#f6e7a0);--accent:#d4af37}
        html,body{height:100%;margin:0;overflow:hidden}
        body{background:radial-gradient(1200px 600px at 10% 10%, rgba(212,175,55,0.08), transparent),linear-gradient(180deg,#081428 0%,#041226 100%);color:#fff;font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial}
        
        .container{width:100%;height:100vh;position:relative;overflow:hidden}
        .screen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box;transition:transform 0.3s ease,opacity 0.3s ease;transform:translateX(100%);opacity:0}
        .screen.active{transform:translateX(0);opacity:1}
        .screen.prev{transform:translateX(-100%);opacity:0}
        
        .card{width:100%;max-width:760px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:14px;padding:22px;border:1px solid rgba(255,255,255,0.03);box-shadow:0 20px 50px rgba(2,6,23,0.6);max-height:90vh;overflow-y:auto}
        h1{font-family:'Playfair Display',serif;margin:0 0 20px 0;font-size:18px;text-align:center}
        .menu-grid{display:flex;flex-direction:column;gap:12px;align-items:flex-start}
        .menu-btn{padding:12px 16px;border-radius:10px;background:linear-gradient(90deg,#1a2040, #1e2442);border:1px solid rgba(212,175,55,0.15);color:rgba(255,255,255,0.65);cursor:pointer;font-weight:400;font-size:14px;min-width:220px;width:220px;display:inline-flex;align-items:center;justify-content:flex-start;text-align:left;padding-left:20px;white-space:nowrap;overflow:hidden;transition:all 0.2s ease;box-sizing:border-box;border:none}
        .menu-btn:hover{background:linear-gradient(90deg,#2a3050, #2e3452);border-color:rgba(212,175,55,0.25)}
        .back-btn{background:linear-gradient(90deg,#403020, #443822);border-color:rgba(212,175,55,0.2);margin-top:20px;width:100%;text-align:center}
        .back-btn:hover{background:linear-gradient(90deg,#504030, #544832)}
        
        /* Стили для акций */
        .loading{text-align:center;padding:40px;color:rgba(255,255,255,0.65)}
        .loading-spinner{display:inline-block;width:30px;height:30px;border:3px solid rgba(212,175,55,0.3);border-radius:50%;border-top-color:#d4af37;animation:spin 1s ease-in-out infinite;margin-bottom:15px}
        @keyframes spin{to{transform:rotate(360deg)}}
        
        .promotions-list{display:flex;flex-direction:column;gap:15px}
        .promotion-card{background:rgba(255,255,255,0.03);border:1px solid rgba(212,175,55,0.2);border-radius:12px;padding:20px;position:relative;overflow:hidden;transition:all 0.3s ease}
        .promotion-card:hover{border-color:rgba(212,175,55,0.4);transform:translateY(-2px)}
        .promotion-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#d4af37,#f6e7a0)}
        
        .promotion-title{font-size:16px;font-weight:600;margin-bottom:10px;color:#d4af37;display:flex;align-items:center;gap:8px}
        .promotion-description{color:rgba(255,255,255,0.65);line-height:1.5;margin-bottom:12px;font-size:14px}
        .promotion-dates{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;font-size:12px}
        .date-item{background:rgba(212,175,55,0.1);padding:4px 10px;border-radius:15px;color:#d4af37}
        .promotion-status{display:inline-block;padding:4px 10px;border-radius:15px;font-size:11px;font-weight:600;text-transform:uppercase}
        .status-active{background:rgba(0,255,0,0.1);color:#00ff00}
        .status-published{background:rgba(255,165,0,0.1);color:#ffa500}
        .status-finished{background:rgba(128,128,128,0.1);color:#888}
        
        .no-promotions{text-align:center;padding:50px 20px;color:rgba(255,255,255,0.65)}
        .no-promotions-icon{font-size:3rem;margin-bottom:15px;opacity:0.5}
        .no-promotions h2{font-size:18px;margin-bottom:10px;color:#fff}
        .no-promotions p{font-size:14px;line-height:1.5}
        
        /* Аккордеон для акций */
        .promotion-card{background:rgba(255,255,255,0.03);border:1px solid rgba(212,175,55,0.2);border-radius:12px;padding:20px;position:relative;overflow:hidden;transition:all 0.3s ease;cursor:pointer;margin-bottom:15px}
        .promotion-card:hover{border-color:rgba(212,175,55,0.4);transform:translateY(-2px)}
        .promotion-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#d4af37,#f6e7a0)}
        .promotion-card.expanded{border-color:rgba(212,175,55,0.6);background:rgba(255,255,255,0.05)}
        
        .promotion-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
        .promotion-title{font-size:16px;font-weight:600;margin-bottom:10px;color:#d4af37;display:flex;align-items:center;gap:8px;flex:1}
        .promotion-toggle{font-size:20px;color:#d4af37;transition:transform 0.3s ease;margin-left:10px}
        .promotion-card.expanded .promotion-toggle{transform:rotate(180deg)}
        
        .promotion-content{max-height:0;overflow:hidden;transition:max-height 0.3s ease;margin-top:15px}
        .promotion-card.expanded .promotion-content{max-height:1000px}
        
        .promotion-description{color:rgba(255,255,255,0.8);line-height:1.6;margin-bottom:15px;font-size:14px}
        .promotion-dates{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:15px;font-size:12px}
        .date-item{background:rgba(212,175,55,0.15);padding:6px 12px;border-radius:15px;color:#d4af37;border:1px solid rgba(212,175,55,0.3)}
        .promotion-status{display:inline-block;padding:6px 12px;border-radius:15px;font-size:11px;font-weight:600;text-transform:uppercase;margin-bottom:15px}
        .status-active{background:rgba(0,255,0,0.15);color:#00ff00;border:1px solid rgba(0,255,0,0.3)}
        .status-published{background:rgba(255,165,0,0.15);color:#ffa500;border:1px solid rgba(255,165,0,0.3)}
        .status-finished{background:rgba(128,128,128,0.15);color:#888;border:1px solid rgba(128,128,128,0.3)}
        
        .promotion-media{margin-top:15px}
        .media-item{margin-bottom:10px;border-radius:8px;overflow:hidden}
        .media-item img{width:100%;height:auto;border-radius:8px}
        .media-item iframe{width:100%;height:200px;border-radius:8px}
    </style>
</head>
<body>
    <div class="container">
        <!-- Главное меню -->
        <div class="screen active" id="main-screen">
            <div class="card">
                <h1>ЛИЧНЫЙ КАБИНЕТ</h1>
                <div class="menu-grid" id="main_menu_grid"></div>
            </div>
        </div>

        <!-- Агрегаторы -->
        <div class="screen" id="agregatory-screen">
            <div class="card">
                <h1>АГРЕГАТОРЫ</h1>
                <div class="menu-grid" id="agregatory_grid"></div>
                <button class="menu-btn back-btn" onclick="goToMain()">← Назад в меню</button>
            </div>
        </div>

        <!-- Контент -->
        <div class="screen" id="content-screen">
            <div class="card">
                <h1>КОНТЕНТ</h1>
                <div class="menu-grid" id="content_grid"></div>
                <button class="menu-btn back-btn" onclick="goToMain()">← Назад в меню</button>
            </div>
        </div>

        <!-- Финансы -->
        <div class="screen" id="finance-screen">
            <div class="card">
                <h1>ФИНАНСЫ</h1>
                <div class="menu-grid" id="finance_grid"></div>
                <button class="menu-btn back-btn" onclick="goToMain()">← Назад в меню</button>
            </div>
        </div>

        <!-- Технические проблемы -->
        <div class="screen" id="tech-screen">
            <div class="card">
                <h1>ТЕХНИЧЕСКИЕ ПРОБЛЕМЫ</h1>
                <div class="menu-grid" id="tech_grid"></div>
                <button class="menu-btn back-btn" onclick="goToMain()">← Назад в меню</button>
            </div>
        </div>

        <!-- Дизайн и материалы -->
        <div class="screen" id="design-screen">
            <div class="card">
                <h1>ДИЗАЙН И МАТЕРИАЛЫ</h1>
                <div class="menu-grid" id="design_grid"></div>
                <button class="menu-btn back-btn" onclick="goToMain()">← Назад в меню</button>
            </div>
        </div>

        <!-- Акции и мероприятия -->
        <div class="screen" id="events-screen">
            <div class="card">
                <h1>АКЦИИ И МЕРОПРИЯТИЯ</h1>
                <div class="menu-grid" id="events_grid"></div>
                <button class="menu-btn back-btn" onclick="goToMain()">← Назад в меню</button>
            </div>
        </div>

        <!-- Акции -->
        <div class="screen" id="promotions-screen">
            <div class="card">
                <h1>🎉 АКЦИИ</h1>
                <div id="promotions-content">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Загружаем актуальные акции...</p>
                    </div>
                </div>
                <button class="menu-btn back-btn" onclick="goToEvents()">← Назад к мероприятиям</button>
                <button class="menu-btn back-btn" onclick="refreshPromotions()" style="background: linear-gradient(90deg, #2a3050, #2e3452); margin-top: 10px;">🔄 Обновить акции</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        
        // Кэш для акций
        let promotionsCache = {
            data: null,
            timestamp: null,
            ttl: 10 * 60 * 1000 // 10 минут в миллисекундах
        };

        const SECTIONS = [
            'Агрегаторы',
            'Контент', 
            'Финансы',
            'Технические проблемы',
            'Дизайн и материалы',
            'Регламенты и обучение',
            'Акции и мероприятия',
            'Аналитика',
            'Связаться со специалистом'
        ];

        const SUBSECTIONS = {
            'Агрегаторы': [
                'Статус',
                'Проблемы с выгрузкой',
                'Платное продвижение',
                'Ошибки, отклонения и блокировки',
                'Редактирование контента на площадках',
                'Прочие вопросы'
            ],
            'Контент': [
                'Заказ фото/видео съемки',
                'Работа с текстами объявлений',
                'Требования к контенту',
                'Прочие вопросы'
            ],
            'Финансы': [
                'Списания и расходы',
                'Баланс и пополнение',
                'Отчетность',
                'Прочие вопросы'
            ],
            'Технические проблемы': [
                'Доступ к системам',
                'Проблемы с телефонией',
                'Прочие вопросы'
            ],
            'Дизайн и материалы': [
                'Заказ полиграфии',
                'Заказ цифровых материалов',
                'Прочие вопросы'
            ],
            'Акции и мероприятия': [
                'Акции',
                'Мероприятия',
                'События',
                'Прочие вопросы'
            ]
        };

        const SECTIONS_WITH_SUBSECTIONS = ['Агрегаторы', 'Контент', 'Финансы', 'Технические проблемы', 'Дизайн и материалы', 'Акции и мероприятия'];

        // Навигация между экранами
        function showScreen(screenId) {
            const screens = document.querySelectorAll('.screen');
            screens.forEach(screen => {
                screen.classList.remove('active', 'prev');
                if (screen.id === screenId) {
                    screen.classList.add('active');
                } else {
                    screen.classList.add('prev');
                }
            });
        }

        function goToMain() {
            showScreen('main-screen');
        }

        function goToSection(section) {
            const screenMap = {
                'Агрегаторы': 'agregatory-screen',
                'Контент': 'content-screen',
                'Финансы': 'finance-screen',
                'Технические проблемы': 'tech-screen',
                'Дизайн и материалы': 'design-screen',
                'Акции и мероприятия': 'events-screen'
            };
            
            if (screenMap[section]) {
                showScreen(screenMap[section]);
            }
        }

        function goToEvents() {
            showScreen('events-screen');
        }

        function goToPromotions() {
            showScreen('promotions-screen');
            loadPromotions();
        }

        // Отправка данных в бот
        function sendToBot(data) {
            try {
                // Проверяем доступность Telegram API
                if (typeof tg.sendData !== 'function') {
                    console.error('Telegram WebApp API недоступен');
                    tg.showAlert('Ошибка: Telegram API недоступен');
                    return false;
                }
                
                // Валидация данных
                if (!data || typeof data !== 'object') {
                    console.error('Некорректные данные для отправки:', data);
                    tg.showAlert('Ошибка: некорректные данные');
                    return false;
                }
                
                const jsonData = JSON.stringify(data);
                console.log('Отправка данных:', jsonData);
                tg.sendData(jsonData);
                return true;
            } catch(error) {
                console.error('Ошибка при отправке данных:', error);
                tg.showAlert('Ошибка при отправке. Попробуйте ещё раз.');
                return false;
            }
        }

        // Создание главного меню
        function renderMainMenu() {
            const mainGrid = document.getElementById('main_menu_grid');
            mainGrid.innerHTML = '';
            
            SECTIONS.forEach(section => {
                const btn = document.createElement('button');
                btn.className = 'menu-btn';
                btn.textContent = section;
                
                btn.onclick = () => {
                    if (SECTIONS_WITH_SUBSECTIONS.includes(section)) {
                        // Переход к подразделам
                        goToSection(section);
                    } else {
                        // Отправка данных для разделов без подпунктов
                        if (sendToBot({type: 'menu_selection', section: section})) {
                            btn.textContent = 'Отправлено ✓';
                            setTimeout(() => {
                                btn.textContent = section;
                            }, 2000);
                        }
                    }
                };
                
                mainGrid.appendChild(btn);
            });
        }

        // Создание подменю для разделов
        function renderSubsectionMenu(section, gridId) {
            const grid = document.getElementById(gridId);
            grid.innerHTML = '';
            
            if (SUBSECTIONS[section]) {
                SUBSECTIONS[section].forEach(subsection => {
                    const btn = document.createElement('button');
                    btn.className = 'menu-btn';
                    btn.textContent = subsection;
                    
                    btn.onclick = () => {
                        // Специальная обработка для Акций
                        if (section === 'Акции и мероприятия' && subsection === 'Акции') {
                            goToPromotions();
                            return;
                        }
                        
                        // Обычная обработка для остальных подразделов
                        if (sendToBot({type: 'subsection_selection', section: section, subsection: subsection})) {
                            btn.textContent = 'Отправлено ✓';
                            setTimeout(() => {
                                tg.close();
                            }, 1000);
                        }
                    };
                    
                    grid.appendChild(btn);
                });
            }
        }

        // Инициализация
        function init() {
            renderMainMenu();
            renderSubsectionMenu('Агрегаторы', 'agregatory_grid');
            renderSubsectionMenu('Контент', 'content_grid');
            renderSubsectionMenu('Финансы', 'finance_grid');
            renderSubsectionMenu('Технические проблемы', 'tech_grid');
            renderSubsectionMenu('Дизайн и материалы', 'design_grid');
            renderSubsectionMenu('Акции и мероприятия', 'events_grid');
        }

        // Запуск при загрузке
        init();
        
        // Проверяем URL параметры для автоматического перехода
        const urlParams = new URLSearchParams(window.location.search);
        const section = urlParams.get('section');
        if (section === 'promotions') {
            // Автоматически переходим в раздел акций
            setTimeout(() => {
                goToPromotions();
            }, 500);
        }
        
        // Слушатель для получения данных от бота
        tg.onEvent('webAppDataReceived', function(data) {
            console.log('📱 Получены данные от бота:', data);
            try {
                const payload = JSON.parse(data);
                if (payload.type === 'promotions_response') {
                    console.log('🎉 Получены акции от бота:', payload.promotions);
                    const promotions = payload.promotions || [];
                    updatePromotionsCache(promotions);
                    renderPromotions(promotions);
                }
            } catch (e) {
                console.error('❌ Ошибка парсинга данных от бота:', e);
                renderPromotions([]);
            }
        });
        
        // Функции для акций
        function formatDate(dateStr) {
            if (!dateStr) return '';
            try {
                const date = new Date(dateStr);
                return date.toLocaleDateString('ru-RU');
            } catch (e) {
                return dateStr;
            }
        }

        function getStatusText(status) {
            switch (status) {
                case 'active': return 'Активна';
                case 'published': return 'Опубликована';
                case 'finished': return 'Завершена';
                default: return status;
            }
        }

        function getStatusEmoji(status) {
            switch (status) {
                case 'active': return '🟢';
                case 'published': return '🟡';
                case 'finished': return '🔴';
                default: return '⚪';
            }
        }

        function renderPromotions(promotions) {
            const container = document.getElementById('promotions-content');
            console.log('🎨 renderPromotions вызвана с данными:', promotions);
            
            if (!promotions || promotions.length === 0) {
                console.log('📋 Нет акций для отображения');
                container.innerHTML = `
                    <div class="no-promotions">
                        <div class="no-promotions-icon">📋</div>
                        <h2>Актуальных акций пока нет</h2>
                        <p>Следите за обновлениями!<br>Мы обязательно сообщим о новых предложениях.</p>
                    </div>
                `;
                return;
            }
            
            console.log(`🎉 Отображаем ${promotions.length} акций`);

            let html = '<div class="promotions-list">';
            promotions.forEach((promotion, index) => {
                const datesHtml = [];
                if (promotion.start_date) {
                    datesHtml.push(`<span class="date-item">📅 Начало: ${formatDate(promotion.start_date)}</span>`);
                }
                if (promotion.end_date) {
                    datesHtml.push(`<span class="date-item">⏰ Окончание: ${formatDate(promotion.end_date)}</span>`);
                }

                const statusEmoji = getStatusEmoji(promotion.ui_status);
                const statusText = getStatusText(promotion.ui_status);
                
                // Медиа контент
                const mediaHtml = renderMediaContent(promotion.media || []);

                html += `
                    <div class="promotion-card" onclick="togglePromotion(${index})">
                        <div class="promotion-header">
                            <div class="promotion-title">
                                ${statusEmoji} ${promotion.name || 'Без названия'}
                            </div>
                            <div class="promotion-toggle">▼</div>
                        </div>
                        <div class="promotion-content">
                            ${promotion.description ? `<div class="promotion-description">${promotion.description}</div>` : ''}
                            ${datesHtml.length > 0 ? `<div class="promotion-dates">${datesHtml.join('')}</div>` : ''}
                            <div class="promotion-status status-${promotion.ui_status || 'unknown'}">
                                ${statusText}
                            </div>
                            ${mediaHtml}
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }
        
        function togglePromotion(index) {
            console.log(`🔄 togglePromotion вызвана для индекса: ${index}`);
            const cards = document.querySelectorAll('.promotion-card');
            console.log(`📋 Найдено ${cards.length} карточек акций`);
            const card = cards[index];
            if (card) {
                card.classList.toggle('expanded');
                console.log(`✅ Карточка ${index} переключена, класс expanded: ${card.classList.contains('expanded')}`);
            } else {
                console.error(`❌ Карточка с индексом ${index} не найдена`);
            }
        }
        
        function renderMediaContent(media) {
            if (!media || media.length === 0) {
                return '';
            }
            
            let html = '<div class="promotion-media">';
            media.forEach(item => {
                if (item.type === 'image') {
                    html += `<div class="media-item"><img src="${item.url}" alt="Медиа контент" loading="lazy"></div>`;
                } else if (item.type === 'video') {
                    if (item.url.includes('youtube.com/embed')) {
                        html += `<div class="media-item"><iframe src="${item.url}" frameborder="0" allowfullscreen></iframe></div>`;
                    } else {
                        html += `<div class="media-item"><video controls><source src="${item.url}" type="video/mp4"></video></div>`;
                    }
                }
            });
            html += '</div>';
            return html;
        }

        function loadPromotions() {
            // Проверяем кэш
            if (promotionsCache.data && promotionsCache.timestamp) {
                const now = Date.now();
                const cacheAge = now - promotionsCache.timestamp;
                
                if (cacheAge < promotionsCache.ttl) {
                    console.log('💾 Используем кэшированные акции');
                    renderPromotions(promotionsCache.data);
                    return;
                } else {
                    console.log('⏰ Кэш устарел, обновляем данные');
                }
            }
            
            // Запрашиваем реальные данные акций от бота
            console.log('🔄 Загружаем акции от бота...');
            
            // Отправляем запрос на получение акций
            const requestData = {
                type: 'get_promotions',
                timestamp: new Date().toISOString()
            };
            
            if (sendToBot(requestData)) {
                console.log('✅ Запрос акций отправлен боту');
                // Показываем загрузку пока ждем ответ
                setTimeout(() => {
                    // Если через 5 секунд нет ответа, показываем пустое состояние
                    const container = document.getElementById('promotions-content');
                    if (container.innerHTML.includes('loading-spinner')) {
                        console.log('⏰ Таймаут загрузки акций, показываем пустое состояние');
                        renderPromotions([]);
                    }
                }, 5000);
            } else {
                console.error('❌ Не удалось отправить запрос акций');
                renderPromotions([]);
            }
        }
        
        function updatePromotionsCache(promotions) {
            promotionsCache.data = promotions;
            promotionsCache.timestamp = Date.now();
            console.log('💾 Кэш акций обновлен');
        }
        
        function refreshPromotions() {
            // Очищаем кэш и загружаем заново
            promotionsCache.data = null;
            promotionsCache.timestamp = null;
            console.log('🔄 Принудительное обновление акций');
            loadPromotions();
        }
    </script>
</body>
