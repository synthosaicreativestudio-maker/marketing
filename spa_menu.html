<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Меню — Marketing SPA</title>
    <meta name="theme-color" content="#0b1226">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root{--bg:#071028;--card:rgba(255,255,255,0.03);--muted:rgba(255,255,255,0.65);--gold:linear-gradient(90deg,#d4af37,#f6e7a0);--accent:#d4af37}
        html,body{height:100%;margin:0;overflow:hidden}
        body{
            background: radial-gradient(1200px 600px at 10% 10%, rgba(212,175,55,0.08), transparent),
                        linear-gradient(180deg, #081428 0%, #041226 100%);
            color:#fff;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
            display:flex;align-items:center;justify-content:center;padding:32px;
        }
        .container{
            width:100%;max-width:760px;
            display:flex;flex-direction:column;gap:28px;align-items:flex-start;
            position:relative
        }
        .screen{display:none;width:100%}
        .screen.active{display:block}
        .card{
            background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
            padding:22px;border-radius:14px;border:1px solid rgba(255,255,255,0.03);
            box-shadow:0 20px 50px rgba(2,6,23,0.6);backdrop-filter: blur(6px);
            max-height:90vh;overflow-y:auto
        }
        .header{
            display:flex;align-items:center;gap:15px;width:100%;
            position:relative;
            margin-bottom: 20px;
            justify-content: flex-start;
        }
        .logo{
            width:80px;height:80px;border-radius:6px;overflow:hidden;
            flex-shrink: 0;
            z-index:1000;
            background: transparent; /* убираем белый фон */
        }
        .logo img{
            width:100%;height:100%;object-fit:contain; /* contain вместо cover для лучшего отображения */
            background: transparent; /* убираем фон */
            display: block; /* убираем отступы */
        }
        .brand-text{
            text-align:left;
            position:relative;
            z-index:1;
        }
        
        h1{font-family:'Faraz Serif',serif;margin:0;font-size:18px;text-align:left;color:#ffffff !important}
        .brand-text h1{color:#ffffff !important}
        .card h1{color:#ffffff !important}
        .menu-grid{display:flex;flex-direction:column;gap:12px;align-items:flex-start}
        .menu-btn{
            padding:12px 16px;border-radius:10px;
            background:linear-gradient(90deg,#d4af37,#f6e7a0);color:#0b1226;
            cursor:pointer;font-weight:700;font-size:12px;min-width:238px;width:238px;
            display:inline-flex;align-items:center;justify-content:flex-start;text-align:left;
            padding-left:20px;white-space:nowrap;overflow:hidden;transition:all 0.2s ease;
            box-sizing:border-box;border:none;font-family:'Faraz Serif',serif
        }
        .menu-btn:hover{
            background:linear-gradient(90deg,#f6e7a0,#d4af37);
            transform:translateY(-1px);box-shadow:0 4px 8px rgba(212,175,55,0.3)
        }
        .back-btn{
            background:linear-gradient(90deg,#d4af37,#f6e7a0);color:#0b1226;
            margin-top:20px;width:238px;text-align:center;font-weight:700;
            font-size:12px;
        }
        .back-btn:hover{
            background:linear-gradient(90deg,#f6e7a0,#d4af37);
            transform:translateY(-1px);box-shadow:0 4px 8px rgba(212,175,55,0.3)
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Главное меню -->
        <div class="screen active" id="main-screen">
            <div class="card">
                <div class="header">
                    <div class="logo">
                        <img src="logo_marketing.png" alt="Marketing Logo">
                    </div>
                    <div class="brand-text">
                <h1>ЛИЧНЫЙ КАБИНЕТ</h1>
                    </div>
                </div>
                <div class="menu-grid" id="main_menu_grid"></div>
            </div>
        </div>

        <!-- Агрегаторы -->
        <div class="screen" id="agregatory-screen">
            <div class="card">
                <div class="header">
                    <div class="logo">
                        <img src="logo_marketing.png" alt="Marketing Logo">
                    </div>
                    <div class="brand-text">
                <h1>АГРЕГАТОРЫ</h1>
                    </div>
                </div>
                <div class="menu-grid" id="agregatory_grid"></div>
                <button class="menu-btn back-btn" onclick="goToMain()">← Назад в меню</button>
            </div>
        </div>

        <!-- Контент -->
        <div class="screen" id="content-screen">
            <div class="card">
                <div class="header">
                    <div class="logo">
                        <img src="logo_marketing.png" alt="Marketing Logo">
                    </div>
                    <div class="brand-text">
                <h1>КОНТЕНТ</h1>
                    </div>
                </div>
                <div class="menu-grid" id="content_grid"></div>
                <button class="menu-btn back-btn" onclick="goToMain()">← Назад в меню</button>
            </div>
        </div>

        <!-- Финансы -->
        <div class="screen" id="finance-screen">
            <div class="card">
                <div class="header">
                    <div class="logo">
                        <img src="logo_marketing.png" alt="Marketing Logo">
                    </div>
                    <div class="brand-text">
                <h1>ФИНАНСЫ</h1>
                    </div>
                </div>
                <div class="menu-grid" id="finance_grid"></div>
                <button class="menu-btn back-btn" onclick="goToMain()">← Назад в меню</button>
            </div>
        </div>

        <!-- Технические проблемы -->
        <div class="screen" id="tech-screen">
            <div class="card">
                <div class="header">
                    <div class="logo">
                        <img src="logo_marketing.png" alt="Marketing Logo">
                    </div>
                    <div class="brand-text">
                <h1>ТЕХНИЧЕСКИЕ ПРОБЛЕМЫ</h1>
                    </div>
                </div>
                <div class="menu-grid" id="tech_grid"></div>
                <button class="menu-btn back-btn" onclick="goToMain()">← Назад в меню</button>
            </div>
        </div>

        <!-- Дизайн и материалы -->
        <div class="screen" id="design-screen">
            <div class="card">
                <div class="header">
                    <div class="logo">
                        <img src="logo_marketing.png" alt="Marketing Logo">
                    </div>
                    <div class="brand-text">
                <h1>ДИЗАЙН И МАТЕРИАЛЫ</h1>
                    </div>
                </div>
                <div class="menu-grid" id="design_grid"></div>
                <button class="menu-btn back-btn" onclick="goToMain()">← Назад в меню</button>
            </div>
        </div>

        <!-- Регламенты и обучение -->
        <div class="screen" id="reglamenty-i-obuchenie-screen">
            <div class="card">
                <div class="header">
                    <div class="logo">
                        <img src="logo_marketing.png" alt="Marketing Logo">
                    </div>
                    <div class="brand-text">
                        <h1>РЕГЛАМЕНТЫ И ОБУЧЕНИЕ</h1>
                    </div>
                </div>
                <div class="menu-grid" id="reglamenty_i_obuchenie_grid"></div>
                <button class="menu-btn back-btn" onclick="goToMain()">← Назад в меню</button>
            </div>
        </div>

        <!-- Акции и мероприятия -->
        <div class="screen" id="aktsii-i-meropriyatiya-screen">
            <div class="card">
                <div class="header">
                    <div class="logo">
                        <img src="logo_marketing.png" alt="Marketing Logo">
                    </div>
                    <div class="brand-text">
                        <h1>АКЦИИ И МЕРОПРИЯТИЯ</h1>
                    </div>
                </div>
                <div class="menu-grid" id="aktsii_i_meropriyatiya_grid"></div>
                <button class="menu-btn back-btn" onclick="goToMain()">← Назад в меню</button>
            </div>
        </div>

        <!-- Аналитика -->
        <div class="screen" id="analitika-screen">
            <div class="card">
                <div class="header">
                    <div class="logo">
                        <img src="logo_marketing.png" alt="Marketing Logo">
                    </div>
                    <div class="brand-text">
                        <h1>АНАЛИТИКА</h1>
                    </div>
                </div>
                <div class="menu-grid" id="analitika_grid"></div>
                <button class="menu-btn back-btn" onclick="goToMain()">← Назад в меню</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        
        // Проверяем доступность Telegram WebApp API
        if (tg) {
            try {
        tg.ready();
                console.log('Telegram WebApp успешно инициализирован');
            } catch (e) {
                console.error('Ошибка инициализации Telegram WebApp:', e);
            }
        } else {
            console.warn('Telegram WebApp API недоступен');
        }

        const SECTIONS = [
            'Агрегаторы',
            'Контент', 
            'Финансы',
            'Технические проблемы',
            'Дизайн и материалы',
            'Регламенты и обучение',
            'Акции и мероприятия',
            'Аналитика',
            'Связаться со специалистом'
        ];

        const SUBSECTIONS = {
            'Агрегаторы': [
                'Статус',
                'Проблемы с выгрузкой',
                'Платное продвижение',
                'Ошибки, отклонения и блокировки',
                'Редактирование контента на площадках',
                'Прочие вопросы'
            ],
            'Контент': [
                'Заказ фото/видео съемки',
                'Работа с текстами объявлений',
                'Требования к контенту',
                'Прочие вопросы'
            ],
            'Финансы': [
                'Списания и расходы',
                'Баланс и пополнение',
                'Отчетность',
                'Прочие вопросы'
            ],
            'Технические проблемы': [
                'Доступ к системам',
                'Проблемы с телефонией',
                'Прочие вопросы'
            ],
            'Дизайн и материалы': [
                'Заказ полиграфии',
                'Заказ цифровых материалов',
                'Прочие вопросы'
            ],
            'Регламенты и обучение': [
                'Документация',
                'Обучение',
                'Прочие вопросы'
            ],
            'Акции и мероприятия': [
                'Промо-акции',
                'События',
                'Прочие вопросы'
            ],
            'Аналитика': [
                'Отчеты',
                'Метрики',
                'Прочие вопросы'
            ]
        };

        function createMainMenu() {
            console.log('Создаем главное меню');
            const grid = document.getElementById('main_menu_grid');
            if (!grid) {
                console.error('Главное меню grid не найден!');
                return;
            }
            
            grid.innerHTML = '';
            SECTIONS.forEach(section => {
                const btn = document.createElement('button');
                btn.className = 'menu-btn';
                btn.textContent = section;
                
                // Улучшенная обработка кликов для мобильных
                const handleClick = () => {
                    try {
                        // Хаптик для мобильных
                        if (tg?.HapticFeedback) {
                            tg.HapticFeedback.impactOccurred('light');
                        }
                        
                        console.log('Main menu button clicked:', section);
                        goToSection(section);
                        
                    } catch (e) {
                        console.error('Error in main menu click handler:', e);
                        if (tg?.HapticFeedback) {
                            tg.HapticFeedback.notificationOccurred('error');
                        }
                        showError('Ошибка при переходе. Попробуйте ещё раз.');
                    }
                };
                
                // Поддержка как click, так и touch событий
                btn.onclick = handleClick;
                btn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    handleClick();
                });
                
                grid.appendChild(btn);
            });
            
            console.log('Главное меню создано');
        }

        function goToSection(sectionName) {
            console.log('Переходим к разделу:', sectionName);
            
            // Скрываем все экраны
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active', 'prev');
            });
            
            // Определяем какой экран показать
            let sectionScreen;
            switch(sectionName) {
                case 'Агрегаторы':
                    sectionScreen = document.getElementById('agregatory-screen');
                    break;
                case 'Контент':
                    sectionScreen = document.getElementById('content-screen');
                    break;
                case 'Финансы':
                    sectionScreen = document.getElementById('finance-screen');
                    break;
                case 'Технические проблемы':
                    sectionScreen = document.getElementById('tech-screen');
                    break;
                case 'Дизайн и материалы':
                    sectionScreen = document.getElementById('design-screen');
                    break;
                case 'Регламенты и обучение':
                    sectionScreen = document.getElementById('reglamenty_i_obuchenie-screen');
                    break;
                case 'Акции и мероприятия':
                    sectionScreen = document.getElementById('aktsii_i_meropriyatiya-screen');
                    break;
                case 'Аналитика':
                    sectionScreen = document.getElementById('analitika-screen');
                    break;
                default:
                    console.error('Неизвестный раздел:', sectionName);
                    goToMain();
                    return;
            }
            
            if (sectionScreen) {
                sectionScreen.classList.add('active');
                populateSubsections(sectionName, sectionScreen);
            } else {
                console.error('Экран не найден для раздела:', sectionName);
                // Возвращаемся в главное меню если экран не найден
                goToMain();
            }
        }

        function populateSubsections(sectionName, screen) {
            console.log('Заполняем подразделы для:', sectionName, 'экран:', screen);
            
            const subsections = SUBSECTIONS[sectionName] || [];
            console.log('Найдены подразделы:', subsections);
            
            // Ищем grid по ID для конкретного раздела
            let grid;
            switch(sectionName) {
                case 'Агрегаторы':
                    grid = document.getElementById('agregatory_grid');
                    break;
                case 'Контент':
                    grid = document.getElementById('content_grid');
                    break;
                case 'Финансы':
                    grid = document.getElementById('finance_grid');
                    break;
                case 'Технические проблемы':
                    grid = document.getElementById('tech_grid');
                    break;
                case 'Дизайн и материалы':
                    grid = document.getElementById('design_grid');
                    break;
                case 'Регламенты и обучение':
                    grid = document.getElementById('reglamenty_i_obuchenie_grid');
                    break;
                case 'Акции и мероприятия':
                    grid = document.getElementById('aktsii_i_meropriyatiya_grid');
                    break;
                case 'Аналитика':
                    grid = document.getElementById('analitika_grid');
                    break;
                default:
                    // Fallback: ищем по классу
                    grid = screen.querySelector('.menu-grid');
            }
            
            if (!grid) {
                console.error('Grid не найден для раздела:', sectionName, 'экран:', screen);
                return;
            }
            
            console.log('Grid найден:', grid);
            
            grid.innerHTML = '';
            subsections.forEach(subsection => {
                    const btn = document.createElement('button');
                    btn.className = 'menu-btn';
                    btn.textContent = subsection;
                
                // Улучшенная обработка кликов для мобильных
                const handleClick = () => {
                    try {
                        // Хаптик для мобильных
                        if (tg?.HapticFeedback) {
                            tg.HapticFeedback.impactOccurred('light');
                        }
                        
                        console.log('Subsection clicked:', subsection);
                        handleSubsectionClick(sectionName, subsection);
                        
                    } catch (e) {
                        console.error('Error in subsection click handler:', e);
                        if (tg?.HapticFeedback) {
                            tg.HapticFeedback.notificationOccurred('error');
                        }
                        showError('Ошибка при выборе. Попробуйте ещё раз.');
                    }
                };
                
                // Поддержка как click, так и touch событий
                btn.onclick = handleClick;
                btn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    handleClick();
                });
                
                grid.appendChild(btn);
            });
            
            console.log('Подразделы добавлены в grid');
        }

        function handleSubsectionClick(section, subsection) {
            console.log('Обрабатываем клик по подразделу:', section, subsection);
            
            // Отправляем данные в Telegram Bot
            const data = {
                type: 'subsection_selection',
                section: section,
                subsection: subsection
            };
            
            if (tg && typeof tg.sendData === 'function') {
                try {
                    tg.sendData(JSON.stringify(data));
                    console.log('Данные отправлены через Telegram API');
                    
                    // Хаптик подтверждения
                    if (tg?.HapticFeedback) {
                        tg.HapticFeedback.notificationOccurred('success');
                    }
                    
                    showSuccess('Запрос отправлен!');
                    
                    // Закрываем WebApp через некоторое время
                            setTimeout(() => {
                        if (tg?.close) {
                                tg.close();
                        }
                    }, 1500);
                    
                } catch (error) {
                    console.error('Ошибка отправки через Telegram API:', error);
                    showError('Ошибка отправки. Попробуйте ещё раз.');
                }
            } else {
                // Fallback: отправляем через HTTP
                console.log('Telegram API недоступен, используем HTTP fallback');
                sendSubsectionViaHTTP(section, subsection);
            }
        }

        // HTTP fallback для подразделов
        async function sendSubsectionViaHTTP(section, subsection) {
            try {
                const response = await fetch('/subsection', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({section, subsection})
                });
                
                if (response.ok) {
                    console.log('Подраздел отправлен через HTTP');
                    showSuccess('Запрос отправлен через HTTP!');
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                console.error('HTTP fallback failed:', error);
                showError('Ошибка отправки данных. Попробуйте позже.');
            }
        }

        function goToMain() {
            // Скрываем все экраны
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active', 'prev');
            });
            
            // Показываем главное меню
            document.getElementById('main-screen').classList.add('active');
        }

        function showError(message) {
            if (tg?.showAlert) {
                tg.showAlert(message);
            } else {
                alert(message);
            }
        }

        function showSuccess(message) {
            if (tg?.showAlert) {
                tg.showAlert(message);
            } else {
                alert(message);
            }
        }

        // Инициализация при загрузке
        document.addEventListener('DOMContentLoaded', createMainMenu);
    </script>
</body>
</html>
