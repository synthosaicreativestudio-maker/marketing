<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Тест мобильной авторизации</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: linear-gradient(180deg, #081428 0%, #041226 100%);
            color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
            margin: 0;
        }
        
        .test-container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .test-item {
            margin: 15px 0;
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
        }
        
        .status {
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 4px;
            margin-left: 10px;
        }
        
        .ok { background: rgba(76, 175, 80, 0.3); color: #4CAF50; }
        .error { background: rgba(244, 67, 54, 0.3); color: #f44336; }
        .warning { background: rgba(255, 193, 7, 0.3); color: #FFC107; }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            -webkit-appearance: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #d4af37, #f6e7a0);
            color: #0b1226;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            -webkit-appearance: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        #log {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h2>🔍 Диагностика мобильной авторизации</h2>
        
        <div class="test-item">
            <strong>🌐 Окружение:</strong>
            <div id="environment"></div>
        </div>
        
        <div class="test-item">
            <strong>📱 Telegram WebApp API:</strong>
            <div id="telegram-api"></div>
        </div>
        
        <div class="test-item">
            <strong>🎯 Тест авторизации:</strong>
            <input type="text" id="test-code" placeholder="Код партнёра" value="111098">
            <input type="tel" id="test-phone" placeholder="Телефон" value="89827701055">
            <button onclick="testAuth()">Тестировать авторизацию</button>
        </div>
        
        <div class="test-item">
            <strong>🔧 Тест функций Telegram WebApp:</strong>
            <button onclick="testMainButton()">Тест MainButton</button>
            <button onclick="testHaptic()">Тест HapticFeedback</button>
            <button onclick="testShowAlert()">Тест showAlert</button>
            <button onclick="testExpand()">Тест expand</button>
        </div>
        
        <div class="test-item">
            <strong>📋 Лог событий:</strong>
            <div id="log"></div>
        </div>
    </div>

    <script>
        let tg = window.Telegram?.WebApp;
        let logDiv = document.getElementById('log');
        
        function log(message) {
            const timestamp = new Date().toLocaleTimeString();
            logDiv.textContent += `[${timestamp}] ${message}\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }
        
        function getStatus(condition) {
            return condition ? 
                '<span class="status ok">✓ OK</span>' : 
                '<span class="status error">✗ ОШИБКА</span>';
        }
        
        function checkEnvironment() {
            const env = document.getElementById('environment');
            const isMobile = /Mobile|Android|iPhone|iPad/.test(navigator.userAgent);
            const isTelegram = window.location.href.includes('telegram') || 
                              window.location.href.includes('t.me') ||
                              window.location.href.includes('web.telegram.org');
            const isSecure = window.location.protocol === 'https:';
            const hasTouch = 'ontouchstart' in window;
            
            env.innerHTML = `
                Мобильное устройство: ${getStatus(isMobile)}<br>
                Платформа: ${navigator.platform}<br>
                User Agent: ${navigator.userAgent.substring(0, 50)}...<br>
                Открыто в Telegram: ${getStatus(isTelegram)}<br>
                HTTPS соединение: ${getStatus(isSecure)}<br>
                Touch поддержка: ${getStatus(hasTouch)}<br>
                Viewport: ${window.innerWidth}x${window.innerHeight}
            `;
            
            log(`Окружение: мобильное=${isMobile}, платформа=${navigator.platform}, telegram=${isTelegram}, secure=${isSecure}`);
        }
        
        function checkTelegramAPI() {
            const api = document.getElementById('telegram-api');
            const hasTelegram = !!window.Telegram;
            const hasWebApp = !!window.Telegram?.WebApp;
            const hasSendData = typeof tg?.sendData === 'function';
            const hasHaptic = !!tg?.HapticFeedback;
            const hasMainButton = !!tg?.MainButton;
            const hasShowAlert = !!tg?.showAlert;
            const hasClose = !!tg?.close;
            
            api.innerHTML = `
                window.Telegram: ${getStatus(hasTelegram)}<br>
                WebApp: ${getStatus(hasWebApp)}<br>
                sendData(): ${getStatus(hasSendData)}<br>
                HapticFeedback: ${getStatus(hasHaptic)}<br>
                MainButton: ${getStatus(hasMainButton)}<br>
                showAlert: ${getStatus(hasShowAlert)}<br>
                close: ${getStatus(hasClose)}<br>
                Версия: ${tg?.version || 'неизвестно'}
            `;
            
            if (tg) {
                try {
                    tg.ready();
                    if (tg.expand) tg.expand();
                    log('Telegram WebApp инициализирован');
                } catch (e) {
                    log('Ошибка инициализации Telegram WebApp: ' + e.message);
                }
            } else {
                log('Telegram WebApp недоступен');
            }
        }
        
        function testAuth() {
            const code = document.getElementById('test-code').value;
            const phone = document.getElementById('test-phone').value;
            
            log(`🚀 НАЧИНАЕМ ТЕСТ АВТОРИЗАЦИИ`);
            log(`Данные: код=${code}, телефон=${phone}`);
            
        // Новые функции тестирования
        function testMainButton() {
            log('🔘 Тестирование MainButton...');
            
            if (!tg) {
                log('❌ Telegram WebApp недоступен');
                return;
            }
            
            if (!tg.MainButton) {
                log('❌ MainButton недоступен');
                return;
            }
            
            try {
                tg.MainButton.setText('Тестовая кнопка');
                tg.MainButton.show();
                log('✅ MainButton показана');
                
                setTimeout(() => {
                    tg.MainButton.showProgress(true);
                    log('✅ Прогресс включен');
                    
                    setTimeout(() => {
                        tg.MainButton.showProgress(false);
                        tg.MainButton.hide();
                        log('✅ MainButton скрыта');
                    }, 2000);
                }, 1000);
                
            } catch (e) {
                log(`❌ Ошибка MainButton: ${e.message}`);
            }
        }
        
        function testHaptic() {
            log('📳 Тестирование HapticFeedback...');
            
            if (!tg?.HapticFeedback) {
                log('❌ HapticFeedback недоступен');
                return;
            }
            
            try {
                tg.HapticFeedback.impactOccurred('light');
                log('✅ Light impact');
                
                setTimeout(() => {
                    tg.HapticFeedback.impactOccurred('medium');
                    log('✅ Medium impact');
                }, 500);
                
                setTimeout(() => {
                    tg.HapticFeedback.notificationOccurred('success');
                    log('✅ Success notification');
                }, 1000);
                
            } catch (e) {
                log(`❌ Ошибка HapticFeedback: ${e.message}`);
            }
        }
        
        function testShowAlert() {
            log('🚨 Тестирование showAlert...');
            
            if (!tg?.showAlert) {
                log('❌ showAlert недоступен');
                alert('Fallback: обычный alert работает');
                return;
            }
            
            try {
                tg.showAlert('Тестовое уведомление от Telegram WebApp');
                log('✅ showAlert сработал');
            } catch (e) {
                log(`❌ Ошибка showAlert: ${e.message}`);
            }
        }
        
        function testExpand() {
            log('📏 Тестирование expand...');
            
            if (!tg?.expand) {
                log('❌ expand недоступен');
                return;
            }
            
            try {
                const beforeHeight = window.innerHeight;
                log(`Высота до expand: ${beforeHeight}px`);
                
                tg.expand();
                log('✅ expand выполнен');
                
                setTimeout(() => {
                    const afterHeight = window.innerHeight;
                    log(`Высота после expand: ${afterHeight}px`);
                    
                    if (afterHeight > beforeHeight) {
                        log('✅ Размер изменился - expand работает');
                    } else {
                        log('⚠️ Размер не изменился');
                    }
                }, 500);
                
            } catch (e) {
                log(`❌ Ошибка expand: ${e.message}`);
            }
        }
                log('❌ Не заполнены поля');
                return;
            }
            
            // Проверяем доступность Telegram WebApp
            if (!tg) {
                log('❌ Telegram WebApp недоступен');
                log('⚠️ Это может означать, что страница открыта не в Telegram');
                
                // Пробуем HTTP fallback
                log('🔄 Попытка HTTP fallback...');
                testHTTPAuth(code, phone);
                return;
            }
            
            // Проверяем доступность sendData
            if (typeof tg.sendData !== 'function') {
                log('❌ tg.sendData недоступен');
                log(`Тип tg.sendData: ${typeof tg.sendData}`);
                log(`Telegram WebApp версия: ${tg.version || 'неизвестно'}`);
                
                // Проверяем другие методы
                log(`tg.ready: ${typeof tg.ready}`);
                log(`tg.close: ${typeof tg.close}`);
                log(`tg.expand: ${typeof tg.expand}`);
                
                alert('Ошибка: функция отправки недоступна');
                return;
            }
            
            try {
                const data = JSON.stringify({code, phone: phone.replace(/\D/g, '')});
                log(`📤 Отправляем данные: ${data}`);
                
                // Проверяем MainButton
                if (tg.MainButton) {
                    log(`MainButton доступен: показываем прогресс`);
                    tg.MainButton.setText('Отправка...');
                    tg.MainButton.showProgress(true);
                    tg.MainButton.show();
                }
                
                // Тестируем хаптик
                if (tg.HapticFeedback) {
                    try {
                        tg.HapticFeedback.impactOccurred('light');
                        log('✅ Хаптик сработал');
                    } catch (e) {
                        log(`❌ Ошибка хаптика: ${e.message}`);
                    }
                } else {
                    log('⚠️ HapticFeedback недоступен');
                }
                
                // Отправляем данные
                tg.sendData(data);
                log('✅ Данные отправлены успешно через tg.sendData');
                
                // Успешная отправка
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred('success');
                }
                
                log('⏳ Ожидаем ответа от бота...');
                
                setTimeout(() => {
                    if (tg.MainButton) {
                        tg.MainButton.showProgress(false);
                        tg.MainButton.setText('Готово');
                    }
                    
                    log('🎯 Тест завершен. Проверьте чат с ботом.');
                    
                    setTimeout(() => {
                        if (tg.close) {
                            log('🔚 Закрываем WebApp...');
                            tg.close();
                        }
                    }, 2000);
                }, 1000);
                
            } catch (error) {
                log(`❌ Ошибка отправки: ${error.message}`);
                log(`Stack: ${error.stack}`);
                
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred('error');
                }
                
                if (tg.MainButton) {
                    tg.MainButton.showProgress(false);
                    tg.MainButton.setText('Ошибка');
                }
                
                alert('Ошибка: ' + error.message);
            }
        }
        
        // HTTP Fallback для тестирования
        async function testHTTPAuth(code, phone) {
            log('🌐 Тестируем HTTP отправку данных...');
            
            try {
                // Имитируем отправку через fetch
                const testUrl = 'https://httpbin.org/post'; // Тестовый сервер
                const response = await fetch(testUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({code, phone: phone.replace(/\D/g, '')})
                });
                
                if (response.ok) {
                    const result = await response.json();
                    log('✅ HTTP отправка работает');
                    log(`Ответ сервера: ${JSON.stringify(result.json)}`);
                } else {
                    log(`❌ HTTP ошибка: ${response.status}`);
                }
            } catch (error) {
                log(`❌ HTTP fallback ошибка: ${error.message}`);
            }
        }
                log('❌ Не заполнены поля');
                return;
            }
            
            if (!tg) {
                log('❌ Telegram WebApp недоступен');
                alert('Ошибка: откройте через Telegram');
                return;
            }
            
            if (typeof tg.sendData !== 'function') {
                log('❌ tg.sendData недоступен');
                alert('Ошибка: функция отправки недоступна');
                return;
            }
            
            try {
                const data = JSON.stringify({code, phone: phone.replace(/\D/g, '')});
                log(`Отправляем данные: ${data}`);
                
                // Тестируем хаптик
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('light');
                    log('✅ Хаптик работает');
                }
                
                tg.sendData(data);
                log('✅ Данные отправлены успешно');
                
                setTimeout(() => {
                    if (tg.close) {
                        log('Закрываем WebApp...');
                        tg.close();
                    }
                }, 2000);
                
            } catch (error) {
                log(`❌ Ошибка отправки: ${error.message}`);
                alert('Ошибка: ' + error.message);
            }
        }
        
        function testMainButton() {
            if (!tg || !tg.MainButton) {
                log('❌ MainButton недоступен');
                return;
            }
            
            try {
                tg.MainButton.setText('Тест кнопки');
                tg.MainButton.show();
                log('✅ MainButton показан');
                
                setTimeout(() => {
                    tg.MainButton.hide();
                    log('✅ MainButton скрыт');
                }, 3000);
                
            } catch (error) {
                log(`❌ Ошибка MainButton: ${error.message}`);
            }
        }
        
        function testHaptic() {
            if (!tg || !tg.HapticFeedback) {
                log('❌ HapticFeedback недоступен');
                return;
            }
            
            try {
                tg.HapticFeedback.impactOccurred('light');
                log('✅ Light haptic');
                
                setTimeout(() => {
                    tg.HapticFeedback.impactOccurred('medium');
                    log('✅ Medium haptic');
                }, 500);
                
                setTimeout(() => {
                    tg.HapticFeedback.impactOccurred('heavy');
                    log('✅ Heavy haptic');
                }, 1000);
                
            } catch (error) {
                log(`❌ Ошибка HapticFeedback: ${error.message}`);
            }
        }
        
        function testShowAlert() {
            if (!tg || !tg.showAlert) {
                log('❌ showAlert недоступен');
                return;
            }
            
            try {
                tg.showAlert('Тестовое сообщение');
                log('✅ showAlert работает');
            } catch (error) {
                log(`❌ Ошибка showAlert: ${error.message}`);
            }
        }
        
        function testExpand() {
            if (!tg || !tg.expand) {
                log('❌ expand недоступен');
                return;
            }
            
            try {
                tg.expand();
                log('✅ expand выполнен');
            } catch (error) {
                log(`❌ Ошибка expand: ${error.message}`);
            }
        }
        
        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            log('🚀 Страница загружена');
            checkEnvironment();
            checkTelegramAPI();
            
            // Автоматические тесты
            setTimeout(() => {
                if (tg) {
                    log('🔍 Запускаем автоматические тесты...');
                    testMainButton();
                    testHaptic();
                    testShowAlert();
                    testExpand();
                }
            }, 1000);
        });
        
        // Отслеживание событий
        document.addEventListener('click', (e) => {
            log(`Клик по: ${e.target.tagName} (${e.target.textContent?.substring(0, 20)})`);
        });
        
        document.addEventListener('touchstart', (e) => {
            log(`Touch start: ${e.target.tagName}`);
        });
        
        document.addEventListener('touchend', (e) => {
            log(`Touch end: ${e.target.tagName}`);
        });
        
        window.addEventListener('error', (e) => {
            log(`JavaScript ошибка: ${e.message}`);
        });
        
        // Отслеживание изменений размера экрана
        window.addEventListener('resize', () => {
            log(`Размер экрана изменен: ${window.innerWidth}x${window.innerHeight}`);
        });
        
        // Отслеживание ориентации
        window.addEventListener('orientationchange', () => {
            log(`Ориентация изменена: ${window.orientation}`);
        });
    </script>
</body>
</html>
