<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация — Marketing</title>
    <meta name="theme-color" content="#0b1226">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230b1226'/%3E%3Ccircle cx='50' cy='40' r='22' fill='%23d4af37'/%3E%3C/text%3E%3C/svg%3E">
    <style>
        :root{
            --bg: #071028;
            --card: rgba(255,255,255,0.03);
            --muted: rgba(255,255,255,0.65);
            --gold: linear-gradient(90deg, #d4af37, #f6e7a0);
            --accent: #d4af37;
        }
        html,body{height:100%;margin:0}
        body{
            background: radial-gradient(1200px 600px at 10% 10%, rgba(212,175,55,0.08), transparent),
                        linear-gradient(180deg, #081428 0%, #041226 100%);
            color:#fff;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
            display:flex;align-items:center;justify-content:center;padding:32px;
        }
        .shell{
            width:100%;max-width:760px;
            border-radius:18px;padding:28px;
            display:flex;flex-direction:column;gap:28px;align-items:flex-start;
            position:relative;
            margin-top:-80px;
            margin-left:-5%
        }
        .header{
            display:flex;align-items:center;gap:15px;width:100%;
            position:relative;
            margin-bottom: 20px;
        }
        .logo{
            width:50px;height:50px;border-radius:6px;overflow:hidden;
            flex-shrink: 0;
            z-index:1000;
        }
        .logo img{
            width:100%;height:100%;object-fit:cover
        }
        .brand-text{
            text-align:left;
            position:relative;
            z-index:1;
        }
        h1{font-family:'Playfair Display',serif;margin:0;font-size:28px;color:#fff;text-align:left}
        p.lead{margin:8px 0 0 0;color:var(--muted);font-size:9px;text-align:left;white-space:nowrap}
        .card{
            width:280px;
            background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
            padding:16px;border-radius:14px;border:1px solid rgba(255,255,255,0.03);
            box-shadow:0 20px 50px rgba(2,6,23,0.6);backdrop-filter: blur(6px);
            align-self:flex-start
        }
        label{display:block;font-size:13px;color:var(--muted);margin-bottom:8px;text-align:left}
        input[type=text],input[type=tel]{padding:14px;border-radius:10px;border:none;background:rgba(255,255,255,0.03);color:#fff;font-size:15px;box-sizing:border-box}
        #code_input{width:200px}
        #phone_input{width:200px}
        .input-container{display:flex;flex-direction:column;align-items:flex-start;margin-bottom:12px}
        .divider{height:1px;background:linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);margin:18px 0;border-radius:2px}
        
        .auth-button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #d4af37, #f6e7a0);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .auth-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
        }

        @media (max-width:720px){
            .shell{padding:20px;margin-top:-80px;margin-left:-3%}
            .header{gap:10px;margin-bottom:15px}
            .brand-text{text-align:left}
            .logo{width:40px;height:40px}
            #code_input,#phone_input{width:100%;max-width:200px}
            .card{width:100%;max-width:240px;padding:12px}
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="header">
            <div class="logo">
                <img src="logo_marketing.png" alt="Marketing Logo">
            </div>
            <div class="brand-text">
                <h1>Marketing</h1>
                <p class="lead">Панель авторизации партнёра</p>
            </div>
        </div>

        <div class="card">
            <div class="input-container">
                <label for="code_input">Код партнёра</label>
                <input type="text" id="code_input" placeholder="Введите ваш код">
            </div>

            <div class="input-container">
                <label for="phone_input">Телефон партнёра (из КОСМОС)</label>
                <input type="tel" id="phone_input" placeholder="8 XXX XXX XX XX">
            </div>

            <div class="divider"></div>
            
            <button id="auth_button" class="auth-button">
                Авторизоваться
            </button>
            
            <div style="margin-top:12px;display:flex;justify-content:flex-start;align-items:center;width:100%">
                <div style="color:#d4af37;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Powered by SYNTHOS AI®</div>
            </div>
        </div>
    </div>

    <script>
        console.log('Script started loading...');
        
        const tg = window.Telegram.WebApp;
        console.log('Telegram WebApp object:', tg);
        
        tg.ready();
        console.log('WebApp ready called');

        // Настраиваем цвета для лучшего отображения
        try {
            tg.setHeaderColor('#0b1226');
            tg.setBackgroundColor('#071028');
            console.log('Colors set successfully');
        } catch (e) {
            console.log('Error setting colors:', e);
        }

        const codeInput = document.getElementById('code_input');
        const phoneInput = document.getElementById('phone_input');
        const authButton = document.getElementById('auth_button');
        
        console.log('Elements found:', {
            codeInput: !!codeInput,
            phoneInput: !!phoneInput, 
            authButton: !!authButton
        });

        // Форматирование телефона по маске
        phoneInput.addEventListener('input', e => {
            const v = e.target.value.replace(/\D/g, '');
            if (!v) return e.target.value = '';
            let result = '8 (';
            for (let i = 1; i < v.length && i < 11; i++) {
                if (i === 4) result += ') ';
                if (i === 7 || i === 9) result += '-';
                result += v[i];
            }
            e.target.value = result;
        });

        // Простой и надежный обработчик нажатия кнопки
        authButton.addEventListener('click', () => {
            console.log('Auth button clicked!');
            
            const code = codeInput.value.trim();
            const phone = phoneInput.value.replace(/\D/g, '');
            
            console.log('Form data:', { code, phone });

            if (!code) {
                console.log('No code provided');
                tg.showAlert('Пожалуйста, введите код партнёра.');
                return;
            }
            
            if (phone.length !== 11) {
                console.log('Invalid phone length:', phone.length);
                tg.showAlert('Пожалуйста, введите корректный номер телефона.');
                return;
            }

            console.log('Validation passed, starting auth process...');
            authButton.textContent = 'Отправляем...';
            authButton.disabled = true;
            
            // Проверяем доступность sendData
            console.log('sendData available:', typeof tg.sendData);
            
            if (typeof tg.sendData === 'function') {
                try {
                    console.log('Attempting to send via WebApp API...');
                    const data = JSON.stringify({ code, phone, type: 'auth_request' });
                    console.log('Sending data:', data);
                    
                    tg.sendData(data);
                    console.log('Data sent successfully via WebApp API');
                    
                    // Закрываем WebApp после отправки
                    setTimeout(() => {
                        console.log('Attempting to close WebApp...');
                        if (typeof tg.close === 'function') {
                            tg.close();
                        }
                    }, 500);
                    return;
                } catch (error) {
                    console.error('WebApp API failed:', error);
                }
            }
            
            // Резервный метод - показать команду пользователю
            console.log('Using fallback method - showing command');
            const authCommand = `/auth ${code} ${phone}`;
            
            // Пытаемся скопировать в буфер обмена
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(authCommand).then(() => {
                    console.log('Command copied to clipboard');
                    tg.showAlert(`✅ Команда скопирована в буфер обмена!\n\nВставьте её в чат с ботом:\n${authCommand}`);
                }).catch((error) => {
                    console.log('Clipboard copy failed:', error);
                    tg.showAlert(`📋 Скопируйте и отправьте эту команду в чат с ботом:\n\n${authCommand}`);
                });
            } else {
                console.log('Clipboard API not available');
                tg.showAlert(`📋 Скопируйте и отправьте эту команду в чат с ботом:\n\n${authCommand}`);
            }
            
            // Сбрасываем состояние кнопки
            setTimeout(() => {
                authButton.textContent = 'Команда готова!';
                authButton.disabled = false;
            }, 1000);
        });
        
        console.log('Script fully loaded and ready!');
    </script>

</body>
</html>
