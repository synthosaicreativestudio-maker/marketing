<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Авторизация — Marketing</title>
    <meta name="theme-color" content="#0b1226">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230b1226'/%3E%3Ccircle cx='50' cy='40' r='22' fill='%23d4af37'/%3E%3C/text%3E%3C/svg%3E">
    <style>
        :root{
            --bg: #071028;
            --card: rgba(255,255,255,0.03);
            --muted: rgba(255,255,255,0.65);
            --gold: linear-gradient(90deg, #d4af37, #f6e7a0);
            --accent: #d4af37;
        }
        html,body{height:100%;margin:0}
        body{
            background: radial-gradient(1200px 600px at 10% 10%, rgba(212,175,55,0.08), transparent),
                        linear-gradient(180deg, #081428 0%, #041226 100%);
            color:#fff;
            font-family: 'Faraz Serif', serif;
            display:flex;align-items:center;justify-content:center;padding:32px;
        }
        .shell{
            width:100%;max-width:760px;
            border-radius:18px;padding:28px;
            display:flex;flex-direction:column;gap:28px;align-items:flex-start;
            position:relative;
            margin-top:-80px;
            margin-left:-5%
        }
        .header{
            display:flex;align-items:flex-start;gap:15px;width:100%;
            position:relative;
            margin-bottom: 20px; /* фиксированный отступ */
        }
        .logo{
            width:115px;height:115px;border-radius:6px;overflow:hidden;
            flex-shrink: 0; /* не сжимается */
            z-index:1000;
            margin-top: 0px; /* выравнивание по верху надписи */
            background: transparent; /* убираем белый фон */
        }

        .logo img{
            width:100%;height:100%;object-fit:contain;
            background: transparent; /* убираем фон для img */
            display: block; /* убираем возможные отступы */
        }
        .brand-text{
            text-align:left;
            position:relative;
            z-index:1;
        }
        h1{font-family:'Faraz Serif',serif;font-size:24px;font-weight:600;margin:0 0 8px 0;text-align:left;color:#ffffff !important}
        p.lead{font-family:'Faraz Serif',serif;font-size:12px;color:var(--muted);margin:0 0 32px 0;text-align:left;line-height:1.5;color:#ffffff !important}
        .card{
            width:280px;
            background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
            padding:16px;border-radius:14px;border:1px solid rgba(255,255,255,0.03);
            box-shadow:0 20px 50px rgba(2,6,23,0.6);backdrop-filter: blur(6px);
            align-self:flex-start
        }
        label{font-family:'Faraz Serif',serif;font-size:14px;font-weight:500;color:rgba(255,255,255,0.9);margin-bottom:8px;display:block;color:#ffffff !important}
        input[type=text],input[type=tel]{font-family:'Faraz Serif',serif;width:100%;padding:12px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#ffffff;font-size:16px;box-sizing:border-box;transition:border-color 0.2s ease;color:#ffffff !important;-webkit-appearance:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
        #code_input{width:200px}
                #phone_input{width:200px}
        .input-container{display:flex;flex-direction:column;align-items:flex-start;margin-bottom:12px}
        .footer-note{font-family:'Faraz Serif',serif;font-size:12px;color:rgba(255,255,255,0.5);text-align:center;margin-top:24px;color:#ffffff !important}
        .divider{height:1px;background:linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);margin:18px 0;border-radius:2px}
        .cta{display:flex;align-items:center;gap:12px}
        .muted-small{font-family:'Faraz Serif',serif;font-size:11px;color:rgba(255,255,255,0.4);color:#ffffff !important}
        /* responsive */
        @media (max-width:720px){
            .shell{padding:20px;margin-top:-80px;margin-left:-3%}
            .header{gap:10px;margin-bottom:15px}
            .brand-text{text-align:left}
            .logo{width:92px;height:92px;margin-top: 0px;background: transparent;}
            #code_input,#phone_input{width:100%;max-width:200px}
            .card{width:100%;max-width:240px;padding:12px}
        }
    /* menu screen */
    .menu-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}
    .menu-btn{font-family:'Faraz Serif',serif;background:linear-gradient(90deg,#d4af37,#f6e7a0);color:#0b1226;border:none;padding:14px 24px;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.2s ease;width:100%;margin-top:8px;color:#0b1226;-webkit-appearance:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    .menu-title{font-size:18px;margin:0 0 8px 0;font-family:'Faraz Serif',serif}
    </style>
</head>
<body>
    <div class="shell">
        <div class="header">
            <div class="logo">
                <img src="logo_marketing.png" alt="Marketing Logo">
            </div>
            <div class="brand-text">
                <h1>Marketing ЭТАЖИ</h1>
                <p class="lead">панель авторизации партнёра</p>
            </div>
        </div>

        <div class="card">
            <div class="input-container">
                <label for="code_input">Код партнёра</label>
                <input type="text" id="code_input" placeholder="Введите ваш код">
            </div>

            <div class="input-container">
                <label for="phone_input">Телефон партнёра (из КОСМОС)</label>
                <input type="tel" id="phone_input" placeholder="8 XXX XXX XX XX">
            </div>

            <div class="divider"></div>
            <div style="display:flex;justify-content:flex-start;align-items:center;width:100%">
                <div style="color:#d4af37;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Produced by SYNTHOS AI®</div>
            </div>

            <!-- Menu screen (second mini-app) - hidden by default -->
            <div id="menu_screen" style="display:none">
                <h3 class="menu-title">ЛИЧНЫЙ КАБИНЕТ</h3>
                <div class="menu-grid" id="menu_grid"></div>
                <div style="margin-top:12px"><small class="muted-small">Нажмите раздел, чтобы отправить запрос в бота.</small></div>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram?.WebApp;
        
        // Расширенная инициализация для мобильных устройств
        if (tg) {
            try {
                tg.ready();
                
                // Устанавливаем цвет темы для WebApp
                tg.setHeaderColor('#0b1226');
                tg.setBackgroundColor('#071028');
                
                // Расширяем WebApp на весь экран
                tg.expand();
                
                // Включаем жесты для закрытия
                tg.enableClosingConfirmation();
                
                console.log('Telegram WebApp успешно инициализирован');
            } catch (e) {
                console.error('Ошибка инициализации Telegram WebApp:', e);
            }
        } else {
            console.warn('Telegram WebApp API недоступен');
        }

        const codeInput = document.getElementById('code_input');
        const phoneInput = document.getElementById('phone_input');
        const menuScreen = document.getElementById('menu_screen');
        const menuGrid = document.getElementById('menu_grid');

        // Phone mask (keeps behaviour)
        function formatPhone(raw){
            const v = raw.replace(/\D/g,'');
            if(!v) return '';
            let result = '8 (';
            for(let i=1;i<v.length && i<11;i++){
                if(i===4) result += ') ';
                if(i===7||i===9) result += '-';
                result += v[i];
            }
            return result;
        }

        // Улучшенная обработка ввода для мобильных
        phoneInput.addEventListener('input', e => {
            e.target.value = formatPhone(e.target.value);
            updateMainButtonState();
        });
        
        // Дополнительные события для мобильных
        phoneInput.addEventListener('blur', updateMainButtonState);
        phoneInput.addEventListener('keyup', updateMainButtonState);
        phoneInput.addEventListener('paste', (e) => {
            setTimeout(() => {
                e.target.value = formatPhone(e.target.value);
                updateMainButtonState();
            }, 100);
        });
        
        codeInput.addEventListener('input', updateMainButtonState);
        codeInput.addEventListener('blur', updateMainButtonState);
        codeInput.addEventListener('keyup', updateMainButtonState);

        function updateMainButtonState(){
            const phoneDigits = phoneInput.value.replace(/\D/g,'');
            const codeValue = codeInput.value.trim();
            const isValid = codeValue !== '' && phoneDigits.length === 11;
            
            console.log('updateMainButtonState:', {codeValue, phoneDigits: phoneDigits.length, isValid});
            
            if (isValid) {
                // Пробуем использовать MainButton, если доступен
                if (tg && tg.MainButton) {
                    try {
                        tg.MainButton.setText('Подтвердить данные');
                        tg.MainButton.show();
                        hideFallbackButton();
                        console.log('MainButton показана');
                    } catch (e) {
                        console.error('Ошибка MainButton:', e);
                        showFallbackButton();
                    }
                } else {
                    // Если MainButton недоступна, показываем fallback
                    console.log('MainButton недоступна, показываем fallback');
                    showFallbackButton();
                }
            } else {
                // Скрываем все кнопки если данные невалидны
                if (tg && tg.MainButton) {
                    try {
                        tg.MainButton.hide();
                    } catch (e) {
                        console.error('Ошибка скрытия MainButton:', e);
                    }
                }
                hideFallbackButton();
                console.log('Данные невалидны, кнопки скрыты');
            }
        }

        // Fallback кнопка для мобильных устройств
        function showFallbackButton() {
            let fallbackBtn = document.getElementById('fallback_auth_button');
            if (!fallbackBtn) {
                fallbackBtn = document.createElement('button');
                fallbackBtn.id = 'fallback_auth_button';
                fallbackBtn.className = 'menu-btn';
                fallbackBtn.textContent = 'Подтвердить данные';
                fallbackBtn.onclick = handleFallbackAuth;
                fallbackBtn.style.marginTop = '20px';
                fallbackBtn.style.width = '100%';
                
                // Вставляем после формы
                const card = document.querySelector('.card');
                card.appendChild(fallbackBtn);
            }
            fallbackBtn.style.display = 'block';
        }

        function hideFallbackButton() {
            const fallbackBtn = document.getElementById('fallback_auth_button');
            if (fallbackBtn) {
                fallbackBtn.style.display = 'none';
            }
        }

        function handleFallbackAuth() {
            console.log('Fallback авторизация для мобильного устройства');
            sendData();
        }

        // Основной обработчик кнопки Telegram
        if (tg && tg.onEvent) {
            tg.onEvent('mainButtonClicked', function(){
                console.log('Main button clicked - starting authorization');
                handleAuth();
            });
        }

        function handleAuth() {
            try {
                if (tg && tg.MainButton) {
                    tg.MainButton.showProgress(true);
                    tg.MainButton.disable();
                }

                // Установим запасной таймаут на случай, если отправка займёт слишком много времени
                const emergencyTimeout = setTimeout(() => {
                    console.log('Emergency timeout triggered');
                    try{ 
                        if (tg && tg.MainButton) {
                            tg.MainButton.showProgress(false); 
                            tg.MainButton.enable(); 
                        }
                    }catch(e){}
                    showError('Таймаут авторизации. Попробуйте ещё раз.');
                }, 15000); // 15 секунд

                // sendData выполняется синхронно по API, нет callback — поэтому даём пользователю быстрый фидбек
                sendData();

                // После отправки показываем подтверждение и закрываем WebApp, очистив таймаут
                try{
                    if (tg && tg.MainButton) {
                        tg.MainButton.showProgress(false);
                        tg.MainButton.enable();
                    }
                }catch(e){}
                clearTimeout(emergencyTimeout);
                
                // Закрываем WebApp сразу после отправки данных
                try{ 
                    if (tg && tg.close) {
                        tg.close(); 
                    }
                }catch(e){}
            }catch (error) {
                console.error('Error in auth handler:', error);
                try{ 
                    if (tg && tg.MainButton) {
                        tg.MainButton.showProgress(false); 
                        tg.MainButton.enable(); 
                    }
                }catch(e){}
                showError('Ошибка при отправке данных.');
            }
        }

        function sendData(){
            console.log('Sending data to bot');
            const code = codeInput.value.trim();
            const phone = phoneInput.value.replace(/\D/g,'');
            
            // Диагностика для мобильных устройств
            console.log('Device info:', {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                isMobile: /Mobile|Android|iPhone|iPad/.test(navigator.userAgent),
                telegramWebApp: !!window.Telegram?.WebApp,
                telegramSendData: typeof tg?.sendData === 'function'
            });
            
            if(!code || phone.length !== 11){
                console.log('Validation failed:', {code: !!code, phoneLength: phone.length});
                showError('Пожалуйста, заполните корректно все поля.');
                return;
            }
            
            console.log('Sending to bot:', {code, phone: phone.substring(0,3) + '***'});
            
            // Проверяем доступность tg.sendData
            if (tg && typeof tg.sendData === 'function') {
                try {
                    const data = JSON.stringify({code, phone});
                    console.log('Data to send:', data);
                    
                    // Хаптик для мобильных
                    if (tg?.HapticFeedback) {
                        tg.HapticFeedback.impactOccurred('light');
                    }
                    
                    tg.sendData(data);
                    console.log('Data sent successfully via Telegram API');
                    
                    // Хаптик подтверждения
                    if (tg?.HapticFeedback) {
                        tg.HapticFeedback.notificationOccurred('success');
                    }
                    
                    showSuccess('Данные отправлены! Проверьте чат с ботом.');
                    
                } catch (error) {
                    console.error('Error sending data via Telegram API:', error);
                    showError('Ошибка при отправке через Telegram: ' + error.message);
                }
            } else {
                // Fallback: отправляем данные через обычный HTTP запрос
                console.log('Telegram API недоступен, используем HTTP fallback');
                sendDataViaHTTP(code, phone);
            }
        }

        // HTTP fallback для мобильных устройств
        async function sendDataViaHTTP(code, phone) {
            try {
                const response = await fetch('/auth', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({code, phone})
                });
                
                if (response.ok) {
                    console.log('Data sent successfully via HTTP');
                    showSuccess('Данные отправлены через HTTP!');
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                console.error('HTTP fallback failed:', error);
                showError('Ошибка отправки данных. Попробуйте позже.');
            }
        }

        function showError(message) {
            if (tg?.showAlert) {
                tg.showAlert(message);
            } else {
                alert(message);
            }
        }

        function showSuccess(message) {
            if (tg?.showAlert) {
                tg.showAlert(message);
            } else {
                alert(message);
            }
        }

        // --- Second mini-app: menu screen ---
        const SECTIONS = [
            'Агрегаторы',
            'Контент',
            'Финансы',
            'Технические проблемы',
            'Дизайн и материалы',
            'Регламенты и обучение',
            'Акции и мероприятия',
            'Аналитика',
            'Связаться со специалистом'
        ];

        function renderMenu(selectedSection){
            // hide auth inputs and main button
            document.querySelector('.card > .divider').style.display = 'none';
            // hide inputs
            codeInput.style.display = 'none';
            phoneInput.style.display = 'none';
            // show menu
            menuGrid.innerHTML = '';
            SECTIONS.forEach(s => {
                const btn = document.createElement('button');
                btn.className = 'menu-btn';
                btn.textContent = s;
                if(selectedSection && selectedSection === s){
                    btn.style.outline = '2px solid rgba(212,175,55,0.25)';
                }
                
                // Улучшенная обработка кликов для мобильных
                const handleClick = () => {
                    try{
                        // Хаптик для мобильных
                        if (tg?.HapticFeedback) {
                            tg.HapticFeedback.impactOccurred('light');
                        }
                        
                        console.log('Menu button clicked:', s);
                        
                        if (tg && typeof tg.sendData === 'function') {
                            tg.sendData(JSON.stringify({type:'menu_selection', section: s}));
                            // give visual feedback
                            btn.textContent = 'Отправлено ✓';
                            
                            if (tg?.HapticFeedback) {
                                tg.HapticFeedback.notificationOccurred('success');
                            }
                            
                            setTimeout(()=>{
                                if (tg?.close) {
                                    tg.close();
                                }
                            }, 700);
                        } else {
                            console.error('tg.sendData not available for menu');
                            showError('Ошибка отправки. Попробуйте ещё раз.');
                        }
                    }catch(e){
                        console.error('Error in menu click handler:', e);
                        if (tg?.HapticFeedback) {
                            tg.HapticFeedback.notificationOccurred('error');
                        }
                        showError('Ошибка при отправке. Попробуйте ещё раз.');
                    }
                };
                
                // Поддержка как click, так и touch событий
                btn.onclick = handleClick;
                btn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    handleClick();
                });
                
                const wrap = document.createElement('div');
                wrap.appendChild(btn);
                menuGrid.appendChild(wrap);
            });
            menuScreen.style.display = 'block';
            // hide main button if present
            try{ 
                if (tg && tg.MainButton) {
                    tg.MainButton.hide(); 
                }
            }catch(e){}
        }

        // If URL contains ?view=menu2 or ?section=... (or the same in the URL fragment), open the menu screen directly.
        const params = new URLSearchParams(window.location.search);
        let view = params.get('view');
        let sectionParam = params.get('section');

        // Telegram clients sometimes strip query parameters when opening Web Apps.
        // Support fragment-style deep links as well: #view=menu2 or #section=...
        if((!view || !sectionParam) && window.location.hash){
            // Remove leading '#' and optional leading '/'
            const rawHash = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : window.location.hash;
            const hashClean = rawHash.replace(/^\/?/, '');
            const hashParams = new URLSearchParams(hashClean);
            if(!view) view = hashParams.get('view');
            if(!sectionParam) sectionParam = hashParams.get('section');
        }

        if(view === 'menu2' || sectionParam){
            renderMenu(sectionParam ? decodeURIComponent(sectionParam) : null);
        }
    </script>

</body>
</html><!-- Force update -->
