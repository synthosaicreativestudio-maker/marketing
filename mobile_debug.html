<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🔧 Мобильная диагностика</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: linear-gradient(180deg, #081428 0%, #041226 100%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 15px;
            margin: 0;
            font-size: 14px;
        }
        
        .status-item {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border-left: 4px solid #ccc;
        }
        
        .status-ok { border-left-color: #4CAF50; background: rgba(76, 175, 80, 0.1); }
        .status-error { border-left-color: #f44336; background: rgba(244, 67, 54, 0.1); }
        .status-warning { border-left-color: #FF9800; background: rgba(255, 152, 0, 0.1); }
        
        .test-button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #d4af37, #f6e7a0);
            color: #0b1226;
            font-size: 16px;
            font-weight: bold;
            touch-action: manipulation;
        }
        
        .results {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        h1 { font-size: 18px; margin: 0 0 15px 0; }
        h2 { font-size: 16px; margin: 15px 0 8px 0; }
    </style>
</head>
<body>
    <h1>🔧 Диагностика авторизации</h1>
    
    <h2>📱 Статус системы:</h2>
    <div id="system-status"></div>
    
    <h2>🎯 Тесты:</h2>
    <button class="test-button" onclick="testBasicAuth()">Тест базовой авторизации</button>
    <button class="test-button" onclick="testWebAppAPI()">Тест Telegram WebApp API</button>
    <button class="test-button" onclick="clearResults()">Очистить результаты</button>
    
    <h2>📋 Результаты:</h2>
    <div id="results" class="results">Ожидание тестов...</div>

    <script>
        let tg = window.Telegram?.WebApp;
        let results = document.getElementById('results');
        
        function log(message, type = 'info') {
            const time = new Date().toLocaleTimeString();
            const prefix = type === 'error' ? '❌' : type === 'success' ? '✅' : type === 'warning' ? '⚠️' : 'ℹ️';
            results.innerHTML += `[${time}] ${prefix} ${message}\n`;
            results.scrollTop = results.scrollHeight;
        }
        
        function clearResults() {
            results.innerHTML = 'Результаты очищены.\n';
        }
        
        function checkSystemStatus() {
            const status = document.getElementById('system-status');
            const isMobile = /Mobile|Android|iPhone|iPad/.test(navigator.userAgent);
            const isSecure = window.location.protocol === 'https:';
            const hasTelegram = !!window.Telegram;
            const hasWebApp = !!window.Telegram?.WebApp;
            const hasSendData = typeof tg?.sendData === 'function';
            
            status.innerHTML = `
                <div class="status-item ${isMobile ? 'status-ok' : 'status-warning'}">
                    📱 Мобильное устройство: ${isMobile ? 'ДА' : 'НЕТ'}
                </div>
                <div class="status-item ${isSecure ? 'status-ok' : 'status-error'}">
                    🔒 HTTPS: ${isSecure ? 'ДА' : 'НЕТ'}
                </div>
                <div class="status-item ${hasTelegram ? 'status-ok' : 'status-error'}">
                    🤖 Telegram API: ${hasTelegram ? 'ДА' : 'НЕТ'}
                </div>
                <div class="status-item ${hasWebApp ? 'status-ok' : 'status-error'}">
                    📱 WebApp API: ${hasWebApp ? 'ДА' : 'НЕТ'}
                </div>
                <div class="status-item ${hasSendData ? 'status-ok' : 'status-error'}">
                    📤 sendData(): ${hasSendData ? 'ДА' : 'НЕТ'}
                </div>
            `;
            
            log(`Мобильное: ${isMobile}, HTTPS: ${isSecure}, Telegram: ${hasTelegram}, WebApp: ${hasWebApp}, sendData: ${hasSendData}`);
        }
        
        function testWebAppAPI() {
            log('🧪 === ТЕСТ TELEGRAM WEBAPP API ===');
            
            if (!tg) {
                log('Telegram WebApp недоступен!', 'error');
                log('Возможные причины:', 'warning');
                log('1. Страница открыта не в Telegram', 'warning');
                log('2. Старая версия Telegram', 'warning');
                log('3. Не загрузился telegram-web-app.js', 'warning');
                return;
            }
            
            log(`Telegram WebApp версия: ${tg.version || 'неизвестно'}`, 'info');
            
            // Проверяем доступные методы
            const methods = ['ready', 'expand', 'close', 'sendData', 'showAlert'];
            methods.forEach(method => {
                const available = typeof tg[method] === 'function';
                log(`${method}(): ${available ? 'ДОСТУПЕН' : 'НЕ ДОСТУПЕН'}`, available ? 'success' : 'error');
            });
            
            // Проверяем свойства
            const props = ['MainButton', 'HapticFeedback', 'version', 'platform'];
            props.forEach(prop => {
                const available = !!tg[prop];
                log(`${prop}: ${available ? 'ДОСТУПЕН' : 'НЕ ДОСТУПЕН'}`, available ? 'success' : 'warning');
            });
            
            // Тестируем инициализацию
            try {
                tg.ready();
                log('tg.ready() выполнен успешно', 'success');
            } catch (e) {
                log(`Ошибка tg.ready(): ${e.message}`, 'error');
            }
            
            // Тестируем expand
            try {
                if (tg.expand) {
                    tg.expand();
                    log('tg.expand() выполнен успешно', 'success');
                }
            } catch (e) {
                log(`Ошибка tg.expand(): ${e.message}`, 'error');
            }
        }
        
        function testBasicAuth() {
            log('🔑 === ТЕСТ АВТОРИЗАЦИИ ===');
            
            if (!tg) {
                log('Telegram WebApp недоступен - авторизация невозможна!', 'error');
                return;
            }
            
            if (typeof tg.sendData !== 'function') {
                log('tg.sendData недоступен - авторизация невозможна!', 'error');
                log('Обновите Telegram до последней версии', 'warning');
                return;
            }
            
            const testData = {
                code: '111098',
                phone: '89827701055',
                test: true,
                timestamp: Date.now()
            };
            
            try {
                log('Отправляю тестовые данные авторизации...', 'info');
                log(`Данные: ${JSON.stringify(testData)}`, 'info');
                
                // Показываем прогресс если возможно
                if (tg.MainButton) {
                    tg.MainButton.setText('Тестирование...');
                    tg.MainButton.showProgress(true);
                    tg.MainButton.show();
                }
                
                // Хаптик
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('light');
                    log('Хаптик активирован', 'success');
                }
                
                // Отправляем данные
                tg.sendData(JSON.stringify(testData));
                log('✅ tg.sendData выполнен БЕЗ ОШИБОК!', 'success');
                log('Проверьте чат с ботом - должно прийти сообщение', 'success');
                
                // Убираем прогресс
                setTimeout(() => {
                    if (tg.MainButton) {
                        tg.MainButton.showProgress(false);
                        tg.MainButton.setText('Тест завершен');
                    }
                    if (tg.HapticFeedback) {
                        tg.HapticFeedback.notificationOccurred('success');
                    }
                    
                    log('Если в чате НЕТ ответа от бота - проблема в сетевом соединении', 'warning');
                    log('Если есть ответ - WebApp работает корректно!', 'success');
                }, 1000);
                
            } catch (error) {
                log(`❌ ОШИБКА при отправке: ${error.message}`, 'error');
                log(`Стек ошибки: ${error.stack}`, 'error');
                
                if (tg.MainButton) {
                    tg.MainButton.showProgress(false);
                    tg.MainButton.setText('Ошибка');
                }
            }
        }
        
        // Инициализация при загрузке
        document.addEventListener('DOMContentLoaded', () => {
            log('🚀 Диагностическая страница загружена');
            checkSystemStatus();
            
            // Автоматическая инициализация WebApp
            if (tg) {
                try {
                    tg.ready();
                    if (tg.expand) tg.expand();
                    log('WebApp автоматически инициализирован', 'success');
                } catch (e) {
                    log(`Ошибка автоинициализации: ${e.message}`, 'error');
                }
            }
        });
        
        // Отслеживание ошибок
        window.addEventListener('error', (e) => {
            log(`JS Ошибка: ${e.message} (${e.filename}:${e.lineno})`, 'error');
        });
    </script>
</body>
</html>
