<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .debug { background: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .error { color: red; }
        .success { color: green; }
        input { width: 100%; padding: 10px; margin: 10px 0; }
        button { padding: 10px 20px; margin: 5px; }
    </style>
</head>
<body>
    <h1>🔍 Тест Telegram WebApp API</h1>
    
    <div class="debug">
        <h3>📊 Статус WebApp:</h3>
        <div id="webapp_status">Проверяю...</div>
    </div>
    
    <div class="debug">
        <h3>🔧 Доступные методы:</h3>
        <div id="available_methods">Проверяю...</div>
    </div>
    
    <div class="debug">
        <h3>📝 Тест MainButton:</h3>
        <div id="mainbutton_test">Проверяю...</div>
        <button onclick="testMainButton()">Тест MainButton</button>
        <button onclick="showMainButton()">Показать кнопку</button>
        <button onclick="hideMainButton()">Скрыть кнопку</button>
    </div>
    
    <div class="debug">
        <h3>📱 Тест sendData:</h3>
        <input type="text" id="test_data" placeholder="Тестовые данные" value='{"test": "data"}'>
        <button onclick="testSendData()">Тест sendData</button>
        <div id="senddata_result">Готов к тесту</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        
        // Проверяем доступность WebApp
        function checkWebApp() {
            const statusDiv = document.getElementById('webapp_status');
            const methodsDiv = document.getElementById('available_methods');
            
            if (!tg) {
                statusDiv.innerHTML = '<span class="error">❌ Telegram WebApp API не доступен!</span>';
                methodsDiv.innerHTML = '<span class="error">Нет доступных методов</span>';
                return;
            }
            
            statusDiv.innerHTML = '<span class="success">✅ Telegram WebApp API доступен</span>';
            
            // Проверяем доступные методы
            const methods = [];
            if (tg.ready) methods.push('ready');
            if (tg.MainButton) methods.push('MainButton');
            if (tg.sendData) methods.push('sendData');
            if (tg.close) methods.push('close');
            if (tg.showAlert) methods.push('showAlert');
            if (tg.setHeaderColor) methods.push('setHeaderColor');
            if (tg.setBackgroundColor) methods.push('setBackgroundColor');
            
            methodsDiv.innerHTML = `<span class="success">✅ Доступные методы: ${methods.join(', ')}</span>`;
            
            // Инициализируем WebApp
            try {
                tg.ready();
                console.log('WebApp готов к работе');
                
                // Настраиваем цвета
                if (tg.setHeaderColor) tg.setHeaderColor('#0b1226');
                if (tg.setBackgroundColor) tg.setBackgroundColor('#071028');
                
                statusDiv.innerHTML += '<br><span class="success">✅ WebApp инициализирован</span>';
            } catch (error) {
                statusDiv.innerHTML += `<br><span class="error">❌ Ошибка инициализации: ${error.message}</span>`;
            }
        }
        
        // Тест MainButton
        function testMainButton() {
            const testDiv = document.getElementById('mainbutton_test');
            
            if (!tg.MainButton) {
                testDiv.innerHTML = '<span class="error">❌ MainButton не доступен</span>';
                return;
            }
            
            try {
                tg.MainButton.setText('Тестовая кнопка');
                tg.MainButton.show();
                testDiv.innerHTML = '<span class="success">✅ MainButton показан</span>';
            } catch (error) {
                testDiv.innerHTML = `<span class="error">❌ Ошибка MainButton: ${error.message}</span>`;
            }
        }
        
        function showMainButton() {
            if (tg.MainButton) {
                tg.MainButton.setText('Авторизоваться');
                tg.MainButton.show();
                document.getElementById('mainbutton_test').innerHTML += '<br><span class="success">✅ Кнопка "Авторизоваться" показана</span>';
            }
        }
        
        function hideMainButton() {
            if (tg.MainButton) {
                tg.MainButton.hide();
                document.getElementById('mainbutton_test').innerHTML += '<br><span class="success">✅ Кнопка скрыта</span>';
            }
        }
        
        // Тест sendData
        function testSendData() {
            const resultDiv = document.getElementById('senddata_result');
            const testData = document.getElementById('test_data').value;
            
            if (!tg.sendData) {
                resultDiv.innerHTML = '<span class="error">❌ sendData не доступен</span>';
                return;
            }
            
            try {
                tg.sendData(testData);
                resultDiv.innerHTML = '<span class="success">✅ Данные отправлены успешно</span>';
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">❌ Ошибка отправки: ${error.message}</span>`;
            }
        }
        
        // Запускаем проверку при загрузке
        window.addEventListener('load', checkWebApp);
        
        // Обработчик mainButtonClicked
        if (tg && tg.onEvent) {
            tg.onEvent('mainButtonClicked', function() {
                alert('MainButton нажат!');
                console.log('MainButton clicked');
            });
        }
    </script>
</body>
</html>
