[telegram]
# Telegram Bot Configuration
token = ${TELEGRAM_TOKEN}
admin_chat_id = 123456789

[google_sheets]
# Google Sheets Configuration
credentials_path = credentials.json
auth_worksheet_name = Авторизация
tickets_worksheet_name = Обращения
sheet_url = ${SHEET_URL}
tickets_sheet_url = ${TICKETS_SHEET_URL}

[app_settings]
# Application Behavior Settings
debug_mode = false
max_retries = 5
monitoring_interval = 30.0
cache_cleanup_interval = 1800.0
log_file = bot.log

[promotions]
# Promotions Monitoring Configuration  
sheet_url = ${PROMOTIONS_SHEET_URL}
monitoring_interval = 30.0
max_description_length = 300

[auth_settings]
# Authentication Configuration
max_attempts = 3
cache_ttl = 3600.0
block_duration = 1800.0

[openai]
# OpenAI Configuration
api_key = ${OPENAI_API_KEY}
model = gpt-4
max_tokens = 1000
temperature = 0.7

[web_app]
# Web Application URLs
main_url = ${MAIN_URL}
spa_menu_url = ${SPA_MENU_URL}

[network]
# Network and Retry Configuration
connection_timeout = 10.0
read_timeout = 30.0
max_retry_attempts = 5
retry_min_wait = 2.0
retry_max_wait = 60.0
retry_multiplier = 2.0