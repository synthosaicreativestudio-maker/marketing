<!DOCTYPE html>
<html>
<head>
    <title>Тест логотипа</title>
    <style>
        body { background: #333; color: white; padding: 20px; }
        .logo { width: 100px; height: 100px; border: 1px solid white; }
        .logo img { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>
    <h1>Тест загрузки логотипа</h1>
    
    <div class="logo">
        <img src="logo_marketing_optimized.png" alt="Marketing Logo" onload="console.log('Логотип загружен успешно')" onerror="console.log('Ошибка загрузки логотипа')">
    </div>
    
    <p>Проверьте консоль браузера для информации о загрузке</p>
    
    <script>
        // Проверяем загрузку изображения
        const img = document.querySelector('img');
        img.addEventListener('load', () => {
            console.log('✅ Логотип загружен успешно');
            console.log('Размер:', img.naturalWidth, 'x', img.naturalHeight);
        });
        
        img.addEventListener('error', (e) => {
            console.error('❌ Ошибка загрузки логотипа:', e);
        });
    </script>
</body>
</html>
